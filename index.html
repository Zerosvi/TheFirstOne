<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Космический Фронт v24</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #000; font-family: 'Press Start 2P', cursive;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; min-height: 100dvh; image-rendering: pixelated;
      background: #000;
      touch-action: manipulation; -webkit-touch-callout: none;
      -webkit-user-select: none; user-select: none; overflow: hidden;
      position: fixed; width: 100vw; height: 100vh; height: 100dvh;
    }
    .pda-container {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; border: 4px solid #fff;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .header {
      background: #000; border-bottom: 4px solid #fff;
      padding: 8px 16px; display: flex; justify-content: flex-end; align-items: center;
      color: #fff; font-size: 10px; z-index: 10; flex-shrink: 0; min-height: 38px;
    }
    .resources-bar {
      background: #000; border-bottom: 2px solid #fff;
      padding: 6px 16px; display: flex; gap: 16px; flex-wrap: wrap;
      z-index: 10; flex-shrink: 0; font-size: 8px;
    }
    .resource { display: flex; align-items: center; gap: 6px; color: #fff; }
    .resource-value { font-size: 12px; font-weight: bold; color: #ff0; }
    .main-content { display: flex; flex: 1; overflow: hidden; position: relative; flex-direction: row; }
    .galaxy-map { flex: 1; background: #000; position: relative; overflow: hidden; min-width: 0; }
    #galaxy-canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    .star-bg { position: absolute; width: 2px; height: 2px; background: #fff; pointer-events: none; z-index: 1; }
    .map-controls { position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 20; }
    .map-btn {
      width: 50px; height: 50px; border: 4px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 20px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; touch-action: manipulation;
    }
    .map-btn:active { background: #fff; color: #000; }
    .side-panel {
      width: 240px; min-width: 200px; background: #000;
      display: flex; flex-direction: column; gap: 6px; padding: 8px;
      overflow-y: auto; flex-shrink: 0; z-index: 10; font-size: 7px;
      border-left: 4px solid #fff;
    }
    .panel-section { background: #000; border: 4px solid #fff; padding: 8px; }
    .section-title { color: #ff0; font-size: 9px; margin-bottom: 6px; border-bottom: 2px solid #fff; padding-bottom: 4px; text-align: center; }
    .unit-recruit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .unit-recruit-card {
      background: #000; border: 4px solid #fff;
      padding: 10px 6px; cursor: pointer; text-align: center; font-size: 6px;
      touch-action: manipulation; min-height: 55px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .unit-recruit-card:active { border-color: #ff0; background: #222; }
    .recruit-name { color: #fff; margin: 3px 0; font-size: 7px; }
    .recruit-cost { color: #ff0; font-size: 6px; }
    .evolution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .evo-card {
      background: #000; border: 4px solid #fff;
      padding: 10px 8px; cursor: pointer; position: relative; font-size: 6px;
      touch-action: manipulation; min-height: 44px;
    }
    .evo-card:active:not(.purchased):not(.locked) { border-color: #ff0; background: #222; }
    .evo-card.purchased { opacity: 0.4; border-color: #4a4; pointer-events: none; }
    .evo-card.locked { opacity: 0.3; cursor: not-allowed; }
    .evo-card.purchased::after { content: '✓'; position: absolute; top: 4px; right: 6px; color: #0f0; font-size: 14px; }
    .evo-name { color: #fff; font-size: 8px; margin-bottom: 3px; }
    .evo-cost { color: #ff0; font-size: 7px; }
    .action-buttons { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .btn {
      flex: 1; padding: 14px 10px; min-width: 60px;
      border: 4px solid #fff; background: #000;
      color: #fff; font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; touch-action: manipulation;
    }
    .btn:active:not(:disabled) { background: #fff; color: #000; }
    .btn.attack { border-color: #f44; color: #faa; }
    .btn.save { border-color: #4a4; color: #afa; }
    .btn.transfer { border-color: #4af; color: #aaf; }
    .log-panel { background: #000; border: 4px solid #fff; padding: 6px; color: #fff; font-size: 6px; height: 44px; overflow-y: auto; }
    .planet-info-box { font-size: 8px; color: #fff; }
    .garrison-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 4px; }
    .garrison-unit {
      background: #000; border: 4px solid #fff;
      padding: 6px; text-align: center; font-size: 7px; color: #fff;
      cursor: pointer;
    }
    .garrison-unit:active { border-color: #ff0; background: #222; }
    .garrison-unit.selected-for-attack { border-color: #ff0 !important; background: #222 !important; }
    .garrison-unit.selected-for-transfer { border-color: #4af !important; background: #223 !important; }
    .squad-info { color: #ff0; font-size: 7px; margin-top: 3px; text-align: center; min-height: 16px; }

    #battle-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 50; justify-content: center; align-items: center;
    }
    #battle-box {
      background: #000; border: 8px solid #fff;
      padding: 0; width: 90%; max-width: 700px; max-height: 90%;
      display: flex; flex-direction: column;
    }
    #battle-header {
      background: #000; border-bottom: 4px solid #fff;
      padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    }
    #battle-title { font-size: 14px; color: #ff0; }
    .battle-content { display: flex; flex-direction: column; flex: 1; }
    .battle-enemy-area {
      padding: 20px; display: flex; justify-content: center; align-items: center;
      gap: 20px; flex-wrap: wrap; min-height: 100px;
    }
    .enemy-sprite {
      width: 56px; height: 56px; border: 4px solid #f44;
      display: flex; justify-content: center; align-items: center;
      background: #100; position: relative; cursor: pointer;
    }
    .enemy-sprite canvas { width: 100%; height: 100%; image-rendering: pixelated; }
    .enemy-hp-bar {
      position: absolute; bottom: -10px; left: 0; width: 100%; height: 5px;
      background: #400; border: 2px solid #fff;
    }
    .enemy-hp-fill { height: 100%; background: #f00; transition: width 0.3s; }
    .battle-ally-area {
      padding: 14px; display: flex; justify-content: center; align-items: center;
      gap: 10px; flex-wrap: wrap; min-height: 70px;
      border-top: 4px solid #fff;
    }
    .ally-sprite {
      width: 48px; height: 48px; border: 4px solid #4af;
      display: flex; justify-content: center; align-items: center;
      background: #001; cursor: pointer;
    }
    .ally-sprite canvas { width: 100%; height: 100%; image-rendering: pixelated; }
    .ally-sprite.acted { opacity: 0.3; pointer-events: none; }
    .ally-sprite.selected { border-color: #ff0 !important; animation: pulse 0.3s infinite; }
    @keyframes pulse { 0%,100% { border-color: #ff0; } 50% { border-color: #fff; } }
    .battle-ui {
      background: #000; border-top: 4px solid #fff;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .battle-text {
      background: #000; border: 4px solid #fff;
      padding: 10px; min-height: 40px; font-size: 10px; color: #fff; line-height: 1.5;
    }
    .battle-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .battle-menu-btn {
      padding: 14px; border: 4px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; touch-action: manipulation;
    }
    .battle-menu-btn:active { background: #fff; color: #000; }
    .d20-popup {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 64px; height: 64px; z-index: 30; pointer-events: none; display: none;
    }
    .d20-popup-inner {
      width: 100%; height: 100%; background: #fff;
      display: flex; justify-content: center; align-items: center;
      font-family: 'Press Start 2P', cursive; font-size: 24px; color: #000;
      border: 4px solid #000;
    }
    .d20-popup-inner.crit { background: #f44; color: #fff; animation: shake 0.1s infinite; }
    @keyframes shake { 0%,100% { transform: translate(0,0); } 50% { transform: translate(3px,-3px); } }

    .notification-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 80; justify-content: center; align-items: center;
    }
    .notification-box {
      background: #000; border: 8px solid #fff;
      padding: 24px; text-align: center; color: #fff; font-size: 10px;
      max-width: 400px; width: 90%;
    }
    .notification-box h2 { font-size: 18px; margin-bottom: 12px; }
    .btn-close {
      padding: 14px 28px; border: 4px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; margin-top: 16px; touch-action: manipulation;
    }
    .btn-close:active { background: #fff; color: #000; }
  </style>
</head>
<body>
<div class="pda-container">
  <div class="header"><div style="font-size:9px;">ЦИКЛ <span id="turnCounter">1</span> | ВОЛНА <span id="waveCounter">0</span></div></div>
  <div class="resources-bar">
    <div class="resource"><span>◆</span><span class="resource-value" id="creditsValue">1000</span><span>КР</span></div>
    <div class="resource"><span>★</span><span class="resource-value" id="evoPointsValue">3</span><span>ЭВО</span></div>
    <div class="resource"><span>☀</span><span class="resource-value" id="coreValue">0/10</span><span>ЭНЕРГИЯ</span></div>
    <div class="resource"><span>●</span><span class="resource-value" id="planetCountValue">2/12</span><span>ПЛН</span></div>
  </div>
  <div class="main-content">
    <div class="galaxy-map" id="galaxyMap"><canvas id="galaxy-canvas"></canvas>
      <div class="map-controls"><button class="map-btn" id="btnZoomIn">+</button><button class="map-btn" id="btnZoomOut">-</button><button class="map-btn" id="btnCenter">*</button></div>
    </div>
    <div class="side-panel">
      <div class="panel-section"><div class="section-title">ПЛАНЕТА</div><div class="planet-info-box"><div>> <span id="selectedPlanet">ТАП</span></div><div>> <span id="selectedOwner">-</span></div></div><div style="color:#aaa;font-size:6px;margin-top:3px;">ГАРНИЗОН (ТАП ДЛЯ ОТРЯДА):</div><div class="garrison-grid" id="garrisonGrid"><div class="garrison-unit">-</div></div><div class="squad-info" id="squadInfo"></div></div>
      <div class="panel-section"><div class="section-title">ВЕРБОВКА</div><div class="unit-recruit-grid" id="recruitGrid"></div></div>
      <div class="panel-section"><div class="section-title">ЭВОЛЮЦИЯ</div><div class="evolution-grid" id="evolutionGrid"></div></div>
      <div class="panel-section"><div class="section-title">ДЕЙСТВИЯ</div><div class="action-buttons"><button class="btn attack" id="btnAttack">⚔ АТАКА</button><button class="btn transfer" id="btnTransfer">📦 ПЕРЕБРОС</button></div><div class="action-buttons"><button class="btn" id="btnNextTurn">⏭ ХОД</button></div><div class="action-buttons"><button class="btn save" id="btnSave">💾 СОХР</button><button class="btn save" id="btnLoad" style="border-color:#44f;color:#aaf;">📂 ЗАГР</button></div></div>
      <div class="panel-section"><div class="section-title">ЖУРНАЛ</div><div class="log-panel" id="logPanel">ГОТОВ</div></div>
    </div>

    <div id="battle-overlay">
      <div id="battle-box">
        <div id="battle-header"><span id="battle-title">* ПРОТИВНИК ОБНАРУЖЕН</span></div>
        <div class="battle-content">
          <div class="battle-enemy-area" id="battleEnemyArea"></div>
          <div class="battle-ally-area" id="battleAllyArea"></div>
          <div class="battle-ui">
            <div class="battle-text" id="battleText">* Выбери действие.</div>
            <div class="battle-menu" id="battleMenu"></div>
          </div>
        </div>
        <div class="d20-popup" id="d20Popup"><div class="d20-popup-inner" id="d20PopupInner"><span id="d20PopupNum">?</span></div></div>
      </div>
    </div>

    <div class="notification-overlay" id="notificationOverlay">
      <div class="notification-box">
        <h2 id="notifTitle">УВЕДОМЛЕНИЕ</h2>
        <p id="notifText"></p>
        <button class="btn-close" id="btnCloseNotif">ЗАКРЫТЬ</button>
        <button class="btn-close" id="btnNewGame" style="border-color:#4af;color:#aaf;margin-top:8px;">🔄 НОВАЯ ИГРА</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  const galaxyMap = document.getElementById('galaxyMap');
  let W, H, cx, cy;
  function resizeCanvas() { W = galaxyMap.clientWidth; H = galaxyMap.clientHeight; canvas.width = W; canvas.height = H; cx = W/2; cy = H/2; }
  window.addEventListener('resize', resizeCanvas); resizeCanvas();

  // ===== КОСМИЧЕСКИЕ ПИКСЕЛЬ-АРТ ЮНИТЫ =====
  function drawMarine(c,x,y,s){
    c.fillStyle='#334455';c.fillRect(x-s/3,y-s/2,s*2/3,s);
    c.fillStyle='#ffcc88';c.fillRect(x-s/5,y-s/2-s/5,s*2/5,s/3);
    c.fillStyle='#4488cc';c.fillRect(x-s/4,y,s/2,s/5);
    c.fillStyle='#aaddff';c.fillRect(x-s/6,y-s/2-s/4,s/3,s/4);
    c.fillStyle='#fff';c.fillRect(x-s/8,y-s/2-s/3,s/4,s/5);
  }
  function drawHeavy(c,x,y,s){
    c.fillStyle='#445566';c.fillRect(x-s/3,y-s/2,s*2/3,s);
    c.fillStyle='#ffcc88';c.fillRect(x-s/4,y-s/2-s/5,s/2,s/3);
    c.fillStyle='#cc4444';c.fillRect(x-s/3,y-s/2,s*2/3,s/4);
    c.fillStyle='#ffaa44';c.fillRect(x-s/6,y-s/4,s/3,s/3);
    c.fillStyle='#333';c.fillRect(x-s/5,y-s/6,s*2/5,s/4);
  }
  function drawSniper(c,x,y,s){
    c.fillStyle='#223344';c.fillRect(x-s/3,y-s/2,s*2/3,s);
    c.fillStyle='#ffcc88';c.fillRect(x-s/5,y-s/2-s/5,s*2/5,s/3);
    c.fillStyle='#44aa44';c.fillRect(x-s/4,y,s/2,s/5);
    c.fillStyle='#ff4444';c.fillRect(x-s/8,y-s/2-s/3,s/4,s/3);
    c.fillStyle='#000';c.fillRect(x-s/10,y-s/2-s/4,s/5,s/4);
  }
  function drawEngineer(c,x,y,s){
    c.fillStyle='#445544';c.fillRect(x-s/3,y-s/2,s*2/3,s);
    c.fillStyle='#ffcc88';c.fillRect(x-s/5,y-s/2-s/5,s*2/5,s/3);
    c.fillStyle='#ffaa00';c.fillRect(x-s/4,y,s/2,s/5);
    c.fillStyle='#44ccff';c.fillRect(x-s/6,y-s/4,s/3,s/4);
    c.fillStyle='#fff';c.fillRect(x-s/8,y-s/3,s/4,s/5);
  }
  function drawFighter(c,x,y,s){
    c.fillStyle='#336699';c.fillRect(x-s/3,y-s/4,s*2/3,s/2);
    c.fillStyle='#ffffff';c.fillRect(x-s/4,y-s/3,s/2,s/3);
    c.fillStyle='#ff6600';c.fillRect(x-s/5,y+s/4,s*2/5,s/5);
    c.fillStyle='#00ccff';c.fillRect(x-s/4,y,s/2,s/6);
    c.fillStyle='#ff0';c.fillRect(x-s/8,y-s/5,s/4,s/5);
  }
  function drawBomber(c,x,y,s){
    c.fillStyle='#445577';c.fillRect(x-s/3,y-s/4,s*2/3,s/2);
    c.fillStyle='#ffcc00';c.fillRect(x-s/4,y-s/3,s/2,s/3);
    c.fillStyle='#ff0000';c.fillRect(x-s/5,y+s/4,s*2/5,s/5);
    c.fillStyle='#000';c.fillRect(x-s/3,y-s/6,s*2/3,s/5);
    c.fillStyle='#f00';c.fillRect(x-s/6,y-s/4,s/3,s/6);
  }
  function drawDestroyer(c,x,y,s){
    c.fillStyle='#556677';c.fillRect(x-s/3,y-s/3,s*2/3,s*2/3);
    c.fillStyle='#00ccff';c.fillRect(x-s/4,y-s/4,s/2,s/2);
    c.fillStyle='#ffffff';c.fillRect(x-s/6,y-s/5,s/3,s/3);
    c.fillStyle='#004488';c.fillRect(x-s/3,y-s/4,s*2/3,s/6);
    c.fillStyle='#ff4400';c.fillRect(x-s/8,y-s/3,s/4,s/5);
  }
  function drawInvader(c,x,y,s){c.fillStyle='#440000';c.fillRect(x-s/2,y-s/2,s,s);c.fillStyle='#ff0000';c.fillRect(x-s/3,y-s/3,s*2/3,s*2/3);c.fillStyle='#880000';c.fillRect(x-s/6,y-s/6,s/3,s/3);c.fillStyle='#ff0';c.fillRect(x-s/8,y-s/8,s/4,s/4);}
  function drawRoach(c,x,y,s){c.fillStyle='#1a331a';c.fillRect(x-s/2,y-s/3,s,s*2/3);c.fillStyle='#33aa33';c.fillRect(x-s/3,y-s/2,s*2/3,s/3);c.fillStyle='#ff0000';c.fillRect(x-s/8,y-s/8,s/4,s/4);c.fillStyle='#0f0';c.fillRect(x-s/6,y-s/4,s/3,s/6);}
  function drawLeviathan(c,x,y,s){c.fillStyle='#222266';c.fillRect(x-s/2,y-s/3,s,s*2/3);c.fillStyle='#4444cc';c.fillRect(x-s/3,y-s/2,s*2/3,s/3);c.fillStyle='#ffffff';c.fillRect(x-s/6,y-s/6,s/3,s/3);c.fillStyle='#88f';c.fillRect(x-s/4,y-s/3,s/2,s/6);}
  function drawLeviathanMaw(c,x,y,s){c.fillStyle='#662222';c.fillRect(x-s/2,y-s/3,s,s*2/3);c.fillStyle='#cc4444';c.fillRect(x-s/3,y-s/2,s*2/3,s/3);c.fillStyle='#000000';c.fillRect(x-s/5,y-s/4,s*2/5,s/2);c.fillStyle='#f88';c.fillRect(x-s/3,y-s/3,s*2/3,s/6);}
  function drawBigLeviathan(c,x,y,s){c.fillStyle='#332255';c.fillRect(x-s/2,y-s/3,s,s*2/3);c.fillStyle='#6644aa';c.fillRect(x-s/3,y-s/2,s*2/3,s/3);c.fillStyle='#ff0000';c.fillRect(x-s/5,y-s/5,s*2/5,s*2/5);c.fillStyle='#c8f';c.fillRect(x-s/3,y-s/4,s*2/3,s/6);}
  function drawHive(c,x,y,s){c.fillStyle='#442200';c.fillRect(x-s/2,y-s/3,s,s*2/3);c.fillStyle='#ff6600';c.fillRect(x-s/3,y-s/2,s*2/3,s/3);c.fillStyle='#ffff00';c.fillRect(x-s/4,y-s/4,s/2,s/2);c.fillStyle='#f00';c.fillRect(x-s/3,y-s/3,s*2/3,s/6);}

  const UNIT_TYPES = {
    marine:{name:'ПЕХОТИНЕЦ',draw:drawMarine,hp:40,maxHp:40,ac:13,atk:3,dmg:'1d8+3',cost:20,color:'#48c'},
    heavy:{name:'ТЯЖ. ПЕХОТА',draw:drawHeavy,hp:65,maxHp:65,ac:16,atk:5,dmg:'2d6+4',cost:50,color:'#c44'},
    sniper:{name:'СНАЙПЕР',draw:drawSniper,hp:30,maxHp:30,ac:14,atk:7,dmg:'3d6+2',cost:65,color:'#4a4'},
    engineer:{name:'ИНЖЕНЕР',draw:drawEngineer,hp:45,maxHp:45,ac:13,atk:2,dmg:'1d6+2',cost:40,special:'repair',color:'#fa0'},
    fighter:{name:'ИСТРЕБИТЕЛЬ',draw:drawFighter,hp:50,maxHp:50,ac:16,atk:4,dmg:'2d8+3',cost:75,color:'#369'},
    bomber:{name:'БОМБАРДИРОВЩИК',draw:drawBomber,hp:75,maxHp:75,ac:17,atk:6,dmg:'3d8+4',cost:110,special:'залп',color:'#457'},
    destroyer:{name:'ЭСМИНЕЦ',draw:drawDestroyer,hp:160,maxHp:160,ac:20,atk:8,dmg:'5d10+6',cost:220,special:'ямато',color:'#567'},
    invader:{name:'ЗАХВАТЧИК',draw:drawInvader,hp:22,maxHp:22,ac:12,atk:4,dmg:'2d8',cost:0,special:'камикадзе',color:'#f00'},

  function executeAttack(tp){
    if(battleState||gameState.gameOver)return;
    const sp=planets.find(p=>p.id===gameState.selectedPlanetId);if(!sp||sp.type!=='ally')return;
    const al=sp.garrison.filter(u=>u.hp>0);const att=[];const ai=[];sp.garrison.forEach((u,i)=>{if(u.hp>0)ai.push(i);});
    const fr=gameState.attackSquad.map(i=>ai[i]).filter(i=>i!==undefined);

    const fr=gameState.transferSquad.map(i=>ai[i]).filter(i=>i!==undefined);

    let allyUnits, enemyUnits;
    if(owner==='humanity'){allyUnits=units.filter(u=>u.hp>0).map((u,i)=>({...u,id:'a'+i,side:'ally',acted:false,defending:false}));enemyUnits=planet.garrison.filter(u=>u.hp>0).map((u,i)=>({...u,id:'e'+i,side:'enemy'}));}
    else{allyUnits=planet.garrison.filter(u=>u.hp>0).map((u,i)=>({...u,id:'a'+i,side:'ally',acted:false,defending:false}));enemyUnits=units.filter(u=>u.hp>0).map((u,i)=>({...u,id:'e'+i,side:'enemy'}));}
    if(owner==='humanity'&&enemyUnits.length===0&&planet.type==='neutral'){capturePlanet(planet,allyUnits);return;}
    document.getElementById('battle-overlay').style.display='flex';
    document.getElementById('battle-title').textContent=`* ПРОТИВНИК: ${planet.name}`;
    battleState={planet,allyUnits,enemyUnits,isPlayerTurn:true,round:1,selectedAlly:null,menuMode:'main'};
    renderBattleUI();setBattleText('* Выбери действие.');checkBattleStuck();
  }

  function checkBattleStuck(){if(!battleState)return;if(!battleState.allyUnits.some(u=>u.hp>0)){endBattle(false);return;}if(!battleState.enemyUnits.some(u=>u.hp>0)){endBattle(true);return;}if(battleState.isPlayerTurn&&battleState.allyUnits.every(u=>u.acted||u.hp<=0)){setBattleText('* Все юниты действовали. Ход врага...');battleState.isPlayerTurn=false;renderBattleMenu();setTimeout(executeEnemyTurn,600);}}
  function renderBattleUI(){
    const ea=document.getElementById('battleEnemyArea');ea.innerHTML='';if(!battleState)return;
    battleState.enemyUnits.forEach(e=>{if(e.hp<=0)return;const d=document.createElement('div');d.className='enemy-sprite';const c=document.createElement('canvas');c.width=44;c.height=44;drawUnitSprite(c.getContext('2d'),e.type,22,22,40);d.appendChild(c);d.addEventListener('click',()=>onEnemyClick(e.id));const hpBar=document.createElement('div');hpBar.className='enemy-hp-bar';const hpFill=document.createElement('div');hpFill.className='enemy-hp-fill';hpFill.style.width=(e.hp/e.maxHp*100)+'%';hpBar.appendChild(hpFill);d.appendChild(hpBar);ea.appendChild(d);});
    const aa=document.getElementById('battleAllyArea');aa.innerHTML='';
    battleState.allyUnits.forEach(a=>{if(a.hp<=0)return;const d=document.createElement('div');d.className='ally-sprite';const c=document.createElement('canvas');c.width=40;c.height=40;drawUnitSprite(c.getContext('2d'),a.type,20,20,36);d.appendChild(c);if(a.id===battleState.selectedAlly)d.classList.add('selected');if(a.acted)d.classList.add('acted');d.addEventListener('click',()=>onAllyClick(a.id));aa.appendChild(d);});
    renderBattleMenu();
  }
  function renderBattleMenu(){
    const menu=document.getElementById('battleMenu');menu.innerHTML='';if(!battleState)return;
    if(!battleState.isPlayerTurn){menu.innerHTML='<div style="grid-column:1/-1;text-align:center;color:#aaa;">ОЖИДАНИЕ...</div>';return;}
    const hasActable=battleState.allyUnits.some(u=>u.hp>0&&!u.acted);const hasEnemies=battleState.enemyUnits.some(u=>u.hp>0);
    if(!hasActable||!hasEnemies){menu.innerHTML='<div style="grid-column:1/-1;text-align:center;color:#aaa;">НЕТ ДОСТУПНЫХ ДЕЙСТВИЙ</div>';return;}
    if(battleState.menuMode==='main'){menu.innerHTML=`<button class="battle-menu-btn" id="btnFight">⚔ АТАКА</button><button class="battle-menu-btn" id="btnDefend">🛡 ЗАЩИТА</button><button class="battle-menu-btn" id="btnRetreat">🏃 БЕЖАТЬ</button><button class="battle-menu-btn" id="btnEndTurn">⏭ КОНЕЦ ХОДА</button>`;document.getElementById('btnFight').addEventListener('click',()=>{battleState.menuMode='fight';setBattleText('* Выбери своего юнита.');renderBattleUI();});document.getElementById('btnDefend').addEventListener('click',()=>{battleState.menuMode='defend';setBattleText('* Выбери юнита для защиты.');renderBattleUI();});document.getElementById('btnRetreat').addEventListener('click',()=>endBattle(false,true));document.getElementById('btnEndTurn').addEventListener('click',()=>{battleState.isPlayerTurn=false;battleState.allyUnits.forEach(a=>a.defending=false);setBattleText('* Ход врага...');renderBattleMenu();setTimeout(executeEnemyTurn,600);});}
  }
  function onAllyClick(id){if(!battleState||!battleState.isPlayerTurn)return;const u=battleState.allyUnits.find(a=>a.id===id);if(!u||u.acted||u.hp<=0)return;if(battleState.menuMode==='fight'){battleState.selectedAlly=id;setBattleText(`* ${UNIT_TYPES[u.type].name} готов! Выбери врага.`);renderBattleUI();}if(battleState.menuMode==='defend'){const roll=rollD20();const total=roll+gameState.modifiers.ac;showD20Popup(roll,roll>=20,roll===1);u.defending=true;u.acted=true;if(roll>=20){u.hp=Math.min(u.maxHp,u.hp+10);setBattleText(`* КРИТ! ${UNIT_TYPES[u.type].name} +10 HP!`);}else if(roll===1){setBattleText(`* ПРОВАЛ! ${UNIT_TYPES[u.type].name} не смог защититься.`);}else if(total>=15){u.hp=Math.min(u.maxHp,u.hp+5);setBattleText(`* ${UNIT_TYPES[u.type].name} +5 HP!`);}else{setBattleText(`* ${UNIT_TYPES[u.type].name} в защите.`);}if(u.type==='engineer'&&total>=15){const al=battleState.allyUnits.filter(a=>a.hp>0&&a.hp<a.maxHp);if(al.length>0){const t=al[Math.floor(Math.random()*al.length)];t.hp=Math.min(t.maxHp,t.hp+5);setBattleText(`* Инженер чинит ${UNIT_TYPES[t.type].name}! +5 HP`);}}battleState.menuMode='main';battleState.selectedAlly=null;renderBattleUI();renderBattleMenu();checkBattleStuck();}}
  function onEnemyClick(id){if(!battleState||!battleState.isPlayerTurn)return;if(battleState.menuMode==='fight'&&battleState.selectedAlly){const at=battleState.allyUnits.find(a=>a.id===battleState.selectedAlly);const df=battleState.enemyUnits.find(e=>e.id===id);if(at&&df&&df.hp>0&&!at.acted){executeBattleAttack(at,df);at.acted=true;battleState.selectedAlly=null;battleState.menuMode='main';renderBattleUI();renderBattleMenu();checkBattleStuck();}}}
  function executeBattleAttack(attacker,defender){const atk=UNIT_TYPES[attacker.type],def=UNIT_TYPES[defender.type];const effAC=Math.max(1,def.ac-Math.floor(gameState.modifiers.enemyDebuff*10));const roll=rollD20();const total=roll+atk.atk+gameState.modifiers.atk;const crit=roll>=20,fail=roll===1;showD20Popup(roll,crit,fail);if(fail){setBattleText('* Промах! Крит-провал...');}else if(crit||total>=effAC){let dmg=parseDamage(atk.dmg);if(crit)dmg*=2;if(atk.special==='камикадзе'){dmg*=2;attacker.hp=0;}if(atk.special==='залп')dmg=Math.floor(dmg*1.3);if(atk.special==='ямато')dmg=Math.floor(dmg*1.5);defender.hp-=dmg;if(defender.hp<=0){defender.hp=0;setBattleText(`* ${def.name} УНИЧТОЖЕН!`);}else{setBattleText(`* ${atk.name} → ${dmg} урона!`);}}else{setBattleText('* Промах!');}if(attacker.hp<=0)setBattleText('* МИНА ВЗОРВАНА!');}
  function executeEnemyTurn(){if(!battleState)return;battleState.enemyUnits.forEach(e=>{if(e.hp<=0)return;const aa=battleState.allyUnits.filter(a=>a.hp>0);if(aa.length===0)return;const t=aa[Math.floor(Math.random()*aa.length)];const ut=UNIT_TYPES[e.type],dt=UNIT_TYPES[t.type];const effAC=dt.ac+gameState.modifiers.ac+(t.defending?4:0);const roll=rollD20();if(roll===1){setBattleText(`* ${ut.name} промахивается!`);}else if(roll>=20||roll+ut.atk>=effAC){let dmg=parseDamage(ut.dmg);if(roll>=20)dmg*=2;if(t.defending)dmg=Math.floor(dmg*0.5);if(ut.special==='камикадзе'){dmg*=2;e.hp=0;}if(ut.special==='крушитель')aa.forEach(a=>{if(a!==t)a.hp-=Math.floor(dmg*0.3);});if(ut.special==='выводок'&&Math.random()<0.2){const ne={id:'e'+battleState.enemyUnits.length,side:'enemy',type:'roach',hp:50,maxHp:50};battleState.enemyUnits.push(ne);setBattleText('* Улей вывел дрона!');}t.hp-=dmg;if(t.hp<=0){t.hp=0;setBattleText(`* ${dt.name} УНИЧТОЖЕН!`);}else{setBattleText(`* ${ut.name} → ${dmg} урона!`);}}else{setBattleText(`* ${ut.name} промахивается!`);}});battleState.round++;battleState.isPlayerTurn=true;battleState.allyUnits.forEach(a=>{a.acted=false;a.defending=false;});battleState.selectedAlly=null;battleState.menuMode='main';document.getElementById('battle-title').textContent=`* ПРОТИВНИК: ${battleState.planet.name}`;renderBattleUI();renderBattleMenu();if(!battleState.allyUnits.some(u=>u.hp>0)){endBattle(false);return;}if(!battleState.enemyUnits.some(u=>u.hp>0)){endBattle(true);return;}setBattleText('* Твой ход.');}
  function rollD20(){return Math.floor(Math.random()*20)+1;}
  function showD20Popup(r,crit,fail){const p=document.getElementById('d20Popup');p.style.display='flex';const i=document.getElementById('d20PopupInner');document.getElementById('d20PopupNum').textContent=r;i.className='d20-popup-inner';if(crit)i.classList.add('crit');setTimeout(()=>{p.style.display='none';i.className='d20-popup-inner';},700);}
  function setBattleText(t){document.getElementById('battleText').textContent=t;}
  function endBattle(isWin,retreat=false){
    if(!battleState)return;
    const p=battleState.planet;
    const survivors=battleState.allyUnits.filter(u=>u.hp>0);
    const planetId=p.id;
    let ti,tx;
    if(isWin){if(p.type==='enemy'){if(survivors.length>0){capturePlanet(p,survivors);ti='ПОБЕДА!';tx=`${p.name} захвачена!`;}else{addLog('НИЧЬЯ');p.garrison=[];ti='НИЧЬЯ';tx='Враги уничтожены.';}}else if(p.type==='neutral'){capturePlanet(p,survivors);ti='ПОБЕДА!';tx=`${p.name} захвачена!`;}else{p.garrison=survivors;addLog('ЗАЩИЩЕНА');ti='ПОБЕДА!';tx='Атака отбита!';}}
    else{if(p.type==='ally'){p.garrison=[];p.type='neutral';addLog('ПОТЕРЯНА!');ti='ПОРАЖЕНИЕ';tx=`${p.name} потеряна!`;}else if(p.type==='neutral'){p.garrison=battleState.enemyUnits.filter(u=>u.hp>0);p.type='enemy';addLog('ВРАГ ЗАХВАТИЛ');ti='ПОРАЖЕНИЕ';tx='Враг захватил планету!';}checkGameOver();}
    battleState=null;
    document.getElementById('battle-overlay').style.display='none';
    resetState();
    selectPlanet(planetId);
    showNotification(ti,tx);
  }
  function showNotification(ti,tx){
    document.getElementById('notifTitle').textContent=ti;
    document.getElementById('notifTitle').style.color=ti.includes('ПОБЕДА')||ti==='НИЧЬЯ'?'#ff0':'#f44';
    document.getElementById('notifText').textContent=tx;
    // Показываем кнопку "Новая игра" только при окончательном поражении/победе
    document.getElementById('btnNewGame').style.display=gameState.gameOver?'inline-block':'none';
    document.getElementById('notificationOverlay').style.display='flex';
  }
  document.getElementById('btnCloseNotif').addEventListener('click',()=>{document.getElementById('notificationOverlay').style.display='none';});
  document.getElementById('btnNewGame').addEventListener('click',()=>{location.reload();});
  function capturePlanet(p,s){p.garrison=s;p.type='ally';gameState.evolutionPoints+=1;if(p.special?.bonus==='freeUnit'){for(let i=0;i<(p.special.count||1);i++){const ut=UNIT_TYPES[p.special.value];p.garrison.push({type:p.special.value,hp:ut.hp,maxHp:ut.hp});}}if(p.special?.bonus==='evo')gameState.evolutionPoints+=p.special.value;addLog(`ЗАХВАЧЕНА! +1 ЭВО`);}
  function checkGameOver(){
    const al=planets.filter(p=>p.type==='ally');
    const en=planets.find(p=>p.type==='enemy');
    if(!en||en.type==='ally'){endGame(true);return;}
    if(al.length===0){endGame(false);return;}
  }
  function endGame(isWin){
    gameState.gameOver=true;
    const al=planets.filter(p=>p.type==='ally').length;
    const tl=planets.filter(p=>!p.isCore).length;
    const ti=isWin?'ПОБЕДА!':'ПОРАЖЕНИЕ';
    const tx=isWin?`Все планеты захвачены! ${al}/${tl}`:`Все планеты потеряны...`;
    showNotification(ti,tx);
  }

  function saveGame(){const sd={gameState:{...gameState,attackSquad:[],transferSquad:[],mode:'none'},planetsData:planets.map(p=>({id:p.id,type:p.type,ang:p.ang,garrison:p.garrison.map(u=>({type:u.type,hp:u.hp,maxHp:u.maxHp}))})),flyingGroups:flyingGroups.map(g=>({owner:g.owner,targetId:g.targetId,units:g.units.map(u=>({type:u.type,hp:u.hp,maxHp:u.maxHp})),progress:g.progress,x:g.x,y:g.y,tx:g.tx,ty:g.ty}))};localStorage.setItem('cosmicFrontV24',JSON.stringify(sd));}
  function loadGame(){const d=localStorage.getItem('cosmicFrontV24');if(!d)return addLog('НЕТ СОХРАНЕНИЯ');try{const sd=JSON.parse(d);gameState=sd.gameState;sd.planetsData.forEach(pd=>{const p=planets.find(p=>p.id===pd.id);if(p){p.type=pd.type;p.ang=pd.ang;p.garrison=pd.garrison;}});flyingGroups=sd.flyingGroups;battleState=null;resetState();document.getElementById('battle-overlay').style.display='none';document.getElementById('notificationOverlay').style.display='none';selectPlanet(gameState.selectedPlanetId);renderEvolution();updateRecruitGrid();addLog('ЗАГРУЖЕНО');}catch(e){addLog('ОШИБКА');}}
  document.getElementById('btnSave').addEventListener('click',()=>{saveGame();addLog('СОХРАНЕНО');});
  document.getElementById('btnLoad').addEventListener('click',loadGame);

  function updateGameLoop(){if(gameState.gameOver){drawGalaxy();requestAnimationFrame(updateGameLoop);return;}for(let i=flyingGroups.length-1;i>=0;i--){const g=flyingGroups[i];g.progress+=0.03;if(g.progress>=1){const tP=planets.find(p=>p.id===g.targetId);if(tP)startBattle(tP,g.units,g.owner);flyingGroups.splice(i,1);}else{g.x+=(g.tx-g.x)*0.07;g.y+=(g.ty-g.y)*0.07;}}drawGalaxy();requestAnimationFrame(updateGameLoop);}
  function updateUIStats(){document.getElementById('creditsValue').textContent=gameState.credits;document.getElementById('evoPointsValue').textContent=gameState.evolutionPoints;document.getElementById('coreValue').textContent=`${gameState.coreEnergy}/${gameState.maxCoreEnergy}`;document.getElementById('waveCounter').textContent=gameState.wave;document.getElementById('turnCounter').textContent=gameState.turn;const al=planets.filter(p=>p.type==='ally').length;const tl=planets.filter(p=>!p.isCore).length;document.getElementById('planetCountValue').textContent=`${al}/${tl}`;}
  function addLog(m){const lp=document.getElementById('logPanel');const lines=lp.innerHTML.split('<br>');lines.push(m);if(lines.length>4)lines.shift();lp.innerHTML=lines.join('<br>');lp.scrollTop=lp.scrollHeight;}

  function init(){createStars();initGarrisons();selectPlanet(3);renderEvolution();updateRecruitGrid();addLog('v24: КОСМО-ЮНИТЫ');addLog('⚔ АТАКА | 📦 ПЕРЕБРОС');updateGameLoop();}
  init();
})();
</script>
</body>
