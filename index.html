<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Космический Фронт</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      font-family: 'Press Start 2P', cursive;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; min-height: 100dvh;
      image-rendering: pixelated;
      background: radial-gradient(ellipse at center, #0a001a 0%, #000 100%);
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
      position: fixed;
      width: 100vw; height: 100vh; height: 100dvh;
    }

    .pda-container {
      width: 100vw; height: 100vh; height: 100dvh;
      max-width: 100vw; max-height: 100vh; max-height: 100dvh;
      background: #0a0a14;
      border: none;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }

    .scanline {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: rgba(255,255,255,0.03);
      animation: scan 2s linear infinite;
      pointer-events: none; z-index: 100;
    }

    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    .crt-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 99;
    }

    /* === ВЕРХНЯЯ ПОЛОСА === */
    .header {
      background: #0f0f1e;
      border-bottom: 3px solid #3a3a5a;
      padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      color: #8ab4f8; font-size: 11px;
      z-index: 10; flex-shrink: 0; min-height: 44px;
    }

    .subtitle { font-size: 13px; color: #ffd700; text-shadow: 3px 3px 0 #000; letter-spacing: 2px; }

    /* === РЕСУРСЫ === */
    .resources-bar {
      background: #0a0a1e;
      border-bottom: 2px solid #2a2a4a;
      padding: 8px 14px; display: flex; gap: 12px; flex-wrap: wrap;
      z-index: 10; flex-shrink: 0; font-size: 9px;
    }

    .resource { display: flex; align-items: center; gap: 6px; color: #8ab4f8; }
    .resource-value { font-size: 13px; font-weight: bold; color: #ffd700; text-shadow: 2px 2px 0 #000; }

    /* === ОСНОВНОЙ КОНТЕНТ === */
    .main-content { display: flex; flex: 1; overflow: hidden; position: relative; flex-direction: row; }

    /* === КАРТА === */
    .galaxy-map {
      flex: 1; background: #050510;
      position: relative; overflow: hidden;
      min-width: 0;
    }

    #galaxy-canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    .star-bg {
      position: absolute; width: 4px; height: 4px;
      background: white; pointer-events: none; z-index: 1;
      box-shadow: 0 0 6px white;
    }

    /* === КНОПКИ НА КАРТЕ === */
    .map-controls {
      position: absolute; bottom: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 20;
    }

    .map-btn {
      width: 50px; height: 50px;
      border: 3px solid #4a4a6a;
      background: rgba(10,10,30,0.9);
      color: #ffd700;
      font-family: 'Press Start 2P', cursive; font-size: 20px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; touch-action: manipulation;
      border-radius: 8px;
    }

    .map-btn:active { background: #2a2a5e; border-color: #ffd700; transform: scale(0.9); }

    .hint-text {
      position: absolute; bottom: 12px; left: 12px;
      color: rgba(255,255,255,0.25); font-size: 7px;
      pointer-events: none; z-index: 15;
    }

    /* === ПАНЕЛЬ СПРАВА (УВЕЛИЧЕННАЯ) === */
    .side-panel {
      width: 240px; min-width: 200px;
      background: #0a0a1e;
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px; overflow-y: auto; flex-shrink: 0;
      z-index: 10; font-size: 7px;
      border-left: 3px solid #2a2a4a;
    }

    .panel-section {
      background: #0f0f2e;
      border: 2px solid #2a2a4a; padding: 8px;
      border-radius: 6px;
    }

    .section-title {
      color: #ffd700; font-size: 9px;
      margin-bottom: 6px;
      border-bottom: 2px solid #2a2a4a; padding-bottom: 5px;
      letter-spacing: 1px;
    }

    /* === ВЕРБОВКА === */
    .unit-recruit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 6px; }

    .unit-recruit-card {
      background: #1a1a3e;
      border: 3px solid #3a3a5a;
      padding: 10px 5px; cursor: pointer; transition: all 0.1s;
      text-align: center; font-size: 6px;
      touch-action: manipulation;
      border-radius: 6px;
      min-height: 60px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    .unit-recruit-card:active {
      border-color: #ffd700;
      background: #2a2a5e;
      transform: scale(0.93);
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .unit-recruit-card .recruit-icon { font-size: 24px; }
    .unit-recruit-card .recruit-name { color: #b8dff0; margin: 4px 0; font-size: 7px; }
    .unit-recruit-card .recruit-cost { color: #ffd700; font-size: 6px; }

    /* === ЭВОЛЮЦИЯ === */
    .evolution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

    .evo-card {
      background: #1a1a3e;
      border: 3px solid #3a3a5a;
      padding: 10px 6px; cursor: pointer; transition: all 0.1s;
      position: relative; font-size: 6px;
      touch-action: manipulation;
      border-radius: 6px;
      min-height: 50px;
    }

    .evo-card:active:not(.purchased):not(.locked) {
      border-color: #ffd700;
      background: #2a2a5e;
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
      transform: scale(0.95);
    }

    .evo-card.purchased { opacity: 0.4; border-color: #2a4a2a; pointer-events: none; }
    .evo-card.locked { opacity: 0.3; cursor: not-allowed; }
    .evo-card.purchased::after { content: '✓'; position: absolute; top: 4px; right: 6px; color: #4ae04a; font-size: 14px; }
    .evo-card.locked::after { content: 'X'; position: absolute; top: 4px; right: 6px; color: #f84a4a; font-size: 10px; }

    .evo-name { color: #b8dff0; font-size: 8px; margin-bottom: 4px; }
    .evo-cost { color: #ffd700; font-size: 7px; }

    /* === КНОПКИ ДЕЙСТВИЙ === */
    .action-buttons { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

    .btn {
      flex: 1; padding: 14px 8px; min-width: 60px;
      border: 3px solid #4a4a6a;
      background: #1a1a2e;
      color: #b8dff0;
      font-family: 'Press Start 2P', cursive; font-size: 8px;
      cursor: pointer; transition: all 0.1s;
      touch-action: manipulation;
      border-radius: 6px;
    }

    .btn:active:not(:disabled) {
      background: #2a2a5e;
      border-color: #ffd700;
      transform: scale(0.93);
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn.attack {
      border-color: #8a4a4a;
      background: #2e1a1a;
      color: #ffaaaa;
      font-size: 10px;
      animation: attackGlow 1.5s infinite;
    }

    @keyframes attackGlow {
      0%,100% { box-shadow: 0 0 10px rgba(255,0,0,0.3); }
      50% { box-shadow: 0 0 30px rgba(255,0,0,0.6); }
    }

    .btn.save { border-color: #4a8a4a; background: #1a2e1a; color: #aaffaa; font-size: 8px; }

    /* === ЛОГ === */
    .log-panel {
      background: #05051e;
      border: 2px solid #2a2a4a;
      padding: 6px; color: #8ab4f8; font-size: 6px;
      height: 55px; overflow-y: auto; line-height: 1.6;
      border-radius: 6px;
    }

    /* === ИНФО О ПЛАНЕТЕ === */
    .planet-info-box { display: flex; flex-direction: column; gap: 2px; font-size: 8px; color: #8ab4f8; }
    .planet-info-box span { color: #b8dff0; }

    .garrison-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 4px; }
    .garrison-unit {
      background: #1a1a3e;
      border: 2px solid #3a3a5a;
      padding: 5px; text-align: center; font-size: 7px; color: #8ab4f8;
      border-radius: 4px;
    }

    .strength-bar {
      width: 100%; height: 16px; background: #000;
      border: 2px solid #2a2a4a; overflow: hidden; margin-top: 5px;
      border-radius: 4px;
    }

    .strength-fill {
      height: 100%;
      background: repeating-linear-gradient(90deg, #4a8af8 0px, #4a8af8 4px, #3a6ad8 4px, #3a6ad8 8px);
      transition: width 0.5s;
      display: flex; align-items: center; padding-left: 6px;
      font-size: 6px; color: white;
    }

    /* === БИТВА === */
    #battle-overlay {
      display: none; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.96);
      z-index: 50; justify-content: center; align-items: center;
    }

    #battle-box {
      background: #0a0a1e;
      border: 5px double #4a4a8a;
      padding: 14px; width: 96%; max-height: 94%;
      display: flex; flex-direction: column; gap: 8px;
      position: relative;
      image-rendering: pixelated;
      border-radius: 10px;
    }

    .pixel-d20 {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px;
      z-index: 10; pointer-events: none;
    }

    .pixel-d20-inner {
      width: 100%; height: 100%;
      background: #ffd700;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; justify-content: center; align-items: center;
      transition: all 0.2s;
    }

    .pixel-d20-number { font-family: 'Press Start 2P', cursive; font-size: 28px; color: #000; }

    .pixel-d20-inner.crit { background: #ff4444; animation: critShake 0.15s infinite; }
    .pixel-d20-inner.crit-fail { background: #4444ff; }

    @keyframes critShake {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      50% { transform: translate(6px,-6px) rotate(10deg); }
    }

    #battle-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 3px double #3a3a6a; padding-bottom: 8px;
      font-size: 10px; color: #8ab4f8;
    }

    #battle-title { font-size: 16px; font-weight: bold; color: #ffd700; }

    #battle-turn-info {
      text-align: center; font-size: 10px; color: #ffd700;
      padding: 8px; background: #1a1a2e;
      border: 2px solid #3a3a6a;
      border-radius: 6px;
    }

    #battle-field { display: flex; gap: 12px; min-height: 220px; }

    .battle-side {
      flex: 1; border: 4px solid #2a2a4a;
      padding: 10px; background: #05051e;
      display: flex; flex-direction: column; gap: 8px;
      border-radius: 8px;
    }

    .battle-side.ally { border-color: #4a8af8; }
    .battle-side.enemy { border-color: #f84a4a; }

    .battle-side-title {
      text-align: center; font-size: 10px; font-weight: bold;
      padding-bottom: 5px; border-bottom: 2px solid #1a1a3e;
    }

    .battle-side.ally .battle-side-title { color: #4a8af8; }
    .battle-side.enemy .battle-side-title { color: #f84a4a; }

    .battle-units-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      flex: 1; align-content: start;
    }

    .battle-unit-card {
      background: #1a1a2e;
      border: 4px solid #3a3a5a;
      padding: 8px 4px; text-align: center;
      cursor: pointer; transition: all 0.1s; position: relative;
      touch-action: manipulation;
      font-size: 7px;
      border-radius: 6px;
      min-height: 70px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    .battle-unit-card:active { border-color: #8ab4f8; background: #2a2a4e; transform: scale(0.93); }
    .battle-unit-card.selected {
      border-color: #ffd700;
      animation: pixelPulse 0.4s infinite;
      box-shadow: 0 0 30px rgba(255,215,0,0.6);
    }

    .battle-unit-card.dead { opacity: 0.2; pointer-events: none; }

    @keyframes pixelPulse {
      0%,100% { border-color: #ffd700; }
      50% { border-color: #ff8a00; }
    }

    .unit-sprite { font-size: 30px; margin-bottom: 4px; }
    .unit-name { font-size: 7px; color: #b8dff0; margin-bottom: 3px; }

    .unit-hp-bar {
      width: 100%; height: 7px; background: #000;
      border: 2px solid #2a2a4a; margin: 4px 0;
      border-radius: 3px;
    }
    .unit-hp-fill { height: 100%; background: #4ae04a; transition: width 0.3s; }
    .unit-hp-fill.low { background: #f84a4a; animation: lowHpPulse 0.4s infinite; }
    .unit-hp-fill.medium { background: #ffb300; }

    @keyframes lowHpPulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .unit-ac { font-size: 6px; color: #8ab4f8; }
    .unit-dmg { font-size: 6px; color: #ff8a65; }

    .battle-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

    .btn-battle {
      flex: 1; padding: 16px 10px;
      border: 4px solid #4a4a6a;
      background: #1a1a2e;
      color: #b8dff0;
      font-family: 'Press Start 2P', cursive; font-size: 9px;
      cursor: pointer; transition: all 0.1s;
      min-width: 80px;
      touch-action: manipulation;
      border-radius: 8px;
    }

    .btn-battle:active:not(:disabled) {
      background: #2a2a5e;
      border-color: #ffd700;
      transform: scale(0.93);
      box-shadow: 0 0 25px rgba(255,215,0,0.5);
    }

    .btn-battle:disabled { opacity: 0.3; cursor: default; }

    .btn-battle.attack-btn {
      border-color: #f84a4a;
      background: #2e1a1a;
      color: #ffaaaa;
      font-size: 10px;
    }

    .btn-battle.gold-btn { border-color: #ffb300; background: #2e2a10; color: #ffd700; }

    .battle-log {
      height: 60px; overflow-y: auto;
      border: 3px solid #2a2a4a;
      padding: 8px; font-size: 7px; color: #8ab4f8;
      background: #05051e; line-height: 1.7;
      border-radius: 6px;
    }

    #game-over-overlay {
      display: none; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.96);
      z-index: 70; justify-content: center; align-items: center;
    }

    #game-over-box {
      text-align: center; color: #b8dff0; padding: 30px;
      border: 5px double #4a4a6a;
      background: #0a0a1e; font-size: 11px;
      border-radius: 12px;
      width: 90%;
    }

    #game-over-box h2 { font-size: 22px; margin-bottom: 16px; }
    #game-over-box .rating { font-size: 52px; color: #ffd700; margin: 16px 0; text-shadow: 4px 4px 0 #000; }

    .btn-retry {
      padding: 16px 28px; border: 4px solid #ffd700;
      background: #1a1a2e; color: #ffd700;
      font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; margin-top: 16px;
      touch-action: manipulation;
      border-radius: 8px;
    }

    .btn-retry:active { background: #2a2a5e; transform: scale(0.93); }
  </style>
</head>
<body>
<div class="pda-container">
  <div class="scanline"></div>
  <div class="crt-overlay"></div>

  <div class="header">
    <div class="subtitle">КОСМО-ФРОНТ</div>
    <div style="font-size:9px;">ЦИКЛ <span id="turnCounter">1</span> | ВОЛНА <span id="waveCounter">0</span></div>
  </div>

  <div class="resources-bar">
    <div class="resource"><span>◆</span><span class="resource-value" id="creditsValue">800</span><span>КР</span></div>
    <div class="resource"><span>★</span><span class="resource-value" id="evoPointsValue">3</span><span>ЭВО</span></div>
    <div class="resource"><span>☢</span><span class="resource-value" id="coreValue">0</span><span>ЯДРО</span></div>
    <div class="resource"><span>●</span><span class="resource-value" id="planetCountValue">2/12</span><span>ПЛН</span></div>
  </div>

  <div class="main-content">
    <div class="galaxy-map" id="galaxyMap">
      <canvas id="galaxy-canvas"></canvas>
      <div class="map-controls">
        <button class="map-btn" id="btnZoomIn" title="Приблизить">＋</button>
        <button class="map-btn" id="btnZoomOut" title="Отдалить">－</button>
        <button class="map-btn" id="btnCenter" title="К Земле">⊙</button>
      </div>
      <div class="hint-text">ТЯНИ КАРТУ | ТАП ПЛАНЕТА | ЩИПОК ЗУМ</div>
    </div>

    <div class="side-panel">
      <div class="panel-section">
        <div class="section-title">ПЛАНЕТА</div>
        <div class="planet-info-box">
          <div>> <span id="selectedPlanet">ТАП</span></div>
          <div>> <span id="selectedOwner">-</span></div>
        </div>
        <div style="color:#6a6a8a;font-size:7px;margin-top:4px;">ГАРНИЗОН:</div>
        <div class="garrison-grid" id="garrisonGrid"><div class="garrison-unit">НЕТ</div></div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:30%;">СИЛА</div></div>
      </div>

      <div class="panel-section">
        <div class="section-title">ВЕРБОВКА</div>
        <div class="unit-recruit-grid" id="recruitGrid"></div>
      </div>

      <div class="panel-section">
        <div class="section-title">ЭВОЛЮЦИЯ</div>
        <div class="evolution-grid" id="evolutionGrid"></div>
      </div>

      <div class="panel-section">
        <div class="section-title">ДЕЙСТВИЯ</div>
        <div class="action-buttons">
          <button class="btn attack" id="btnAttack">⚔ АТАКА</button>
          <button class="btn" id="btnNextTurn">⏭ ХОД</button>
        </div>
        <div class="action-buttons">
          <button class="btn save" id="btnSave">💾 СОХР</button>
          <button class="btn save" id="btnLoad" style="border-color:#4a4a8a;color:#aaaaff;">📂 ЗАГР</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title">ЖУРНАЛ</div>
        <div class="log-panel" id="logPanel">СИСТЕМА ГОТОВА</div>
      </div>
    </div>

    <div id="battle-overlay">
      <div id="battle-box">
        <div id="battle-header">
          <span id="battle-title">БИТВА</span>
          <span style="font-size:9px;">РАУНД <span id="battle-round">1</span></span>
        </div>
        <div class="pixel-d20"><div class="pixel-d20-inner" id="pixelD20"><span class="pixel-d20-number" id="d20Number">?</span></div></div>
        <div id="battle-turn-info">БРОСОК ИНИЦИАТИВЫ...</div>
        <div id="battle-field">
          <div class="battle-side ally">
            <div class="battle-side-title">ФЛОТ</div>
            <div class="battle-units-grid" id="allyUnits"></div>
          </div>
          <div class="battle-side enemy">
            <div class="battle-side-title">РОЙ</div>
            <div class="battle-units-grid" id="enemyUnits"></div>
          </div>
        </div>
        <div class="battle-actions">
          <button class="btn-battle attack-btn" id="btnBattleAttack" disabled>БРОСИТЬ D20</button>
          <button class="btn-battle gold-btn" id="btnBattleEndTurn">КОНЕЦ ХОДА</button>
          <button class="btn-battle" id="btnBattleRetreat" style="border-color:#5a4a4a;color:#8a7a7a;">БЕЖАТЬ</button>
        </div>
        <div class="battle-log" id="battleLog"></div>
      </div>
    </div>

    <div id="game-over-overlay">
      <div id="game-over-box">
        <h2 id="game-over-title">ИГРА ОКОНЧЕНА</h2>
        <div class="rating" id="game-over-rating">A</div>
        <p id="game-over-stats"></p>
        <button class="btn-retry" onclick="location.reload()">НОВАЯ ИГРА</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  const galaxyMap = document.getElementById('galaxyMap');
  let W, H, cx, cy;

  function resizeCanvas() {
    W = galaxyMap.clientWidth; H = galaxyMap.clientHeight;
    canvas.width = W; canvas.height = H;
    cx = W/2; cy = H/2;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============ ЮНИТЫ ============
  const UNIT_TYPES = {
    astronaut: { name: 'АСТРОНАВТ', icon: '🧑‍🚀', class: 'пехота', hp: 35, maxHp: 35, ac: 11, attackBonus: 3, damage: '1d8+1', avgDamage: 5, cost: 25 },

  };

  function parseDamage(dmg) { const m = dmg.match(/(\d+)d(\d+)([+-]\d+)?/); if (!m) return 0; const n = parseInt(m[1]), s = parseInt(m[2]), b = m[3] ? parseInt(m[3]) : 0; let t = b; for (let i = 0; i < n; i++) t += Math.floor(Math.random() * s) + 1; return t; }

  // ============ ПЛАНЕТЫ ============
  const planets = [
    { id: 0, name: 'СОЛНЕЧНОЕ ЯДРО', dist: 0, ang: 0, speed: 0, size: 22, type: 'sun', garrison: [], special: null, isCore: true },
    { id: 1, name: 'МЕРКУРИЙ', dist: 70, ang: 0.5, speed: 0.04, size: 6, type: 'neutral', garrison: [], special: { name: 'КУЗНИЦА', bonus: 'credits', value: 2 } },
    { id: 2, name: 'ВЕНЕРА', dist: 120, ang: 2.0, speed: 0.025, size: 8, type: 'neutral', garrison: [], special: { name: 'ТЕПЛИЦА', bonus: 'freeUnit', value: 'astronaut', count: 2 } },
    { id: 3, name: 'ЗЕМЛЯ', dist: 170, ang: 3.5, speed: 0.02, size: 10, type: 'ally', garrison: [], special: { name: 'КОЛЫБЕЛЬ', bonus: 'defense', value: 2 } },
    { id: 4, name: 'МАРС', dist: 220, ang: 5.0, speed: 0.015, size: 7, type: 'ally', garrison: [], special: { name: 'КУЗНИЦА', bonus: 'attack', value: 2 } },
    { id: 5, name: 'ЮПИТЕР', dist: 290, ang: 1.0, speed: 0.008, size: 16, type: 'neutral', garrison: [], special: { name: 'ШТОРМ', bonus: 'slowEnemy', value: 2 } },
    { id: 6, name: 'САТУРН', dist: 360, ang: 3.0, speed: 0.006, size: 13, type: 'neutral', garrison: [], special: { name: 'КОЛЬЦА', bonus: 'credits', value: 4 } },
    { id: 7, name: 'УРАН', dist: 430, ang: 4.5, speed: 0.004, size: 9, type: 'neutral', garrison: [], special: { name: 'ЛЁД', bonus: 'freeUnit', value: 'turret', count: 1 } },
    { id: 8, name: 'НЕПТУН', dist: 500, ang: 2.5, speed: 0.003, size: 9, type: 'neutral', garrison: [], special: { name: 'СИНИЙ', bonus: 'evo', value: 1 } },
    { id: 9, name: 'ПЛУТОН', dist: 570, ang: 5.8, speed: 0.002, size: 5, type: 'neutral', garrison: [], special: { name: 'ВРАТА', bonus: 'evo', value: 2 } },
    { id: 10, name: 'НЕМЕЗИДА', dist: 660, ang: 2.0, speed: 0.001, size: 18, type: 'enemy', garrison: [], special: null }
  ];

  function initGarrisons() {
    planets.forEach(p => { p.garrison = []; });
    planets.find(p => p.id === 3).garrison = [
      { type: 'astronaut', hp: 35, maxHp: 35 }, { type: 'astronaut', hp: 35, maxHp: 35 },
      { type: 'astronaut', hp: 35, maxHp: 35 }, { type: 'turret', hp: 60, maxHp: 60 },
      { type: 'spaceship', hp: 50, maxHp: 50 }
    ];
    planets.find(p => p.id === 4).garrison = [
      { type: 'astronaut', hp: 35, maxHp: 35 }, { type: 'warhead', hp: 25, maxHp: 25 }
    ];
    planets.find(p => p.id === 10).garrison = [
      { type: 'mine_invader', hp: 20, maxHp: 20 }, { type: 'mine_invader', hp: 20, maxHp: 20 },
      { type: 'roach_bot', hp: 45, maxHp: 45 }, { type: 'roach_bot', hp: 45, maxHp: 45 },
      { type: 'leviathan', hp: 80, maxHp: 80 }, { type: 'leviathan_maw', hp: 110, maxHp: 110 },
      { type: 'big_leviathan', hp: 160, maxHp: 160 }, { type: 'hive', hp: 250, maxHp: 250 }
    ];
    planets.filter(p => p.type === 'neutral').forEach(p => {
      const c = Math.floor(Math.random() * 3) + 1;
      for (let i = 0; i < c; i++) p.garrison.push({ type: 'roach_bot', hp: 45, maxHp: 45 });
    });
  }

  const EVOLUTION = [
    { id: 'armor1', name: 'БРОНЯ', cost: 2, requires: null, desc: '+1 ЗАЩ', effect: { ac: 1 } },
    { id: 'weapon1', name: 'ПРИЦЕЛ', cost: 2, requires: null, desc: '+1 АТК', effect: { attackBonus: 1 } },
    { id: 'armor2', name: 'ЩИТЫ', cost: 4, requires: 'armor1', desc: '+2 ЗАЩ', effect: { ac: 2 } },
    { id: 'weapon2', name: 'ПЛАЗМА', cost: 4, requires: 'weapon1', desc: '+2 АТК', effect: { attackBonus: 2 } },
    { id: 'core1', name: 'ЯДРО-ТАП', cost: 3, requires: null, desc: '+1☢/ход', effect: { corePerTurn: 1 } },
    { id: 'scanner', name: 'СКАНЕР', cost: 4, requires: null, desc: '-1 ЗАЩ ВРАГА', effect: { enemyDebuff: 0.15 } }
  ];

  let gameState = {
    credits: 800, turn: 1, wave: 0, evolutionPoints: 3, coreEnergy: 0,
    selectedPlanetId: 3,
    modifiers: { ac: 0, attackBonus: 0, enemyDebuff: 0, corePerTurn: 0 },
    purchasedUpgrades: [], gameOver: false
  };

  let flyingUnits = [], battleState = null, isAttackMode = false;

  // ============ ЗВЕЗДЫ ============
  function createStars() {
    const c = document.getElementById('galaxyMap');
    c.querySelectorAll('.star-bg').forEach(s => s.remove());
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star-bg';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.opacity = Math.random() * 0.5 + 0.2;
      c.appendChild(s);
    }
  }

  // ============ КАМЕРА ============
  let cam = { x: 0, y: 0 }, zoom = 1.3;
  const MIN_ZOOM = 0.3, MAX_ZOOM = 4.0;
  let isDragging = false, dragStart = { x: 0, y: 0 }, dragStartCam = { x: 0, y: 0 };

  canvas.addEventListener('pointerdown', (e) => {
    if (battleState || gameState.gameOver) return;
    isDragging = true;
    dragStart.x = e.clientX;
    dragStart.y = e.clientY;
    dragStartCam.x = cam.x;
    dragStartCam.y = cam.y;
  });

  canvas.addEventListener('pointermove', (e) => {
    if (isDragging) {
      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        cam.x = dragStartCam.x - dx / zoom;
        cam.y = dragStartCam.y - dy / zoom;
      }
    }
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    const dist = Math.hypot(dx, dy);

    if (dist < 10) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const wX = (mx - W/2) / zoom + cx + cam.x;
      const wY = (my - H/2) / zoom + cy + cam.y;

      let cp = null;
      for (let p of planets) {
        const px = cx + p.dist * Math.cos(p.ang);
        const py = cy + p.dist * Math.sin(p.ang);
        if (Math.hypot(wX - px, wY - py) < p.size + 12) { cp = p; break; }
      }

      if (cp) {
        if (cp.isCore) {
          harvestCoreEnergy();
        } else if (isAttackMode) {
          if (gameState.selectedPlanetId !== null && cp.id !== gameState.selectedPlanetId) {
            const sP = planets.find(p => p.id === gameState.selectedPlanetId);
            if (sP && sP.type === 'ally' && sP.garrison.some(u => u.hp > 0)) {
              const att = [], rem = [];
              sP.garrison.forEach(u => {
                if (u.hp > 0 && att.length < Math.ceil(sP.garrison.filter(x => x.hp > 0).length / 2)) {
                  att.push({...u}); u.hp = 0;
                } else if (u.hp > 0) rem.push(u);
              });
              sP.garrison = rem;
              att.forEach(u => {
                flyingUnits.push({
                  x: sP.x, y: sP.y, tx: cp.x, ty: cp.y,
                  owner: 'ally', sId: sP.id, tId: cp.id,
                  progress: 0, unitType: u.type, hp: u.hp, maxHp: u.maxHp
                });
              });
              addLog(`ОТПРАВКА ${att.length} НА ${cp.name}`);
              isAttackMode = false;
              document.getElementById('btnAttack').textContent = '⚔ АТАКА';
              selectPlanet(sP.id);
            }
          }
        } else {
          selectPlanet(cp.id);
          if (navigator.vibrate) navigator.vibrate(10);
        }
      }
    }
  });

  // Пинч-зум
  let initialPinchDist = 0;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      initialPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });

  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && initialPinchDist > 0) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * (dist / initialPinchDist)));
      initialPinchDist = dist;
    }
  });

  document.getElementById('btnZoomIn').addEventListener('click', () => { zoom = Math.min(MAX_ZOOM, zoom + 0.25); });
  document.getElementById('btnZoomOut').addEventListener('click', () => { zoom = Math.max(MIN_ZOOM, zoom - 0.25); });
  document.getElementById('btnCenter').addEventListener('click', () => {
    const earth = planets.find(p => p.id === 3);
    cam.x = -earth.dist * Math.cos(earth.ang);
    cam.y = -earth.dist * Math.sin(earth.ang);
    zoom = 1.3;
  });

  // ============ ЯДЕРНАЯ СТАНЦИЯ ============
  function harvestCoreEnergy() {
    const energy = 1 + gameState.modifiers.corePerTurn;
    gameState.coreEnergy += energy;
    addLog(`☢ +${energy} ЯДРО! (${gameState.coreEnergy})`);
    if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
    if (gameState.coreEnergy >= 5) {
      gameState.coreEnergy -= 5;
      gameState.evolutionPoints += 1;
      addLog('5 ЯДРА -> +1 ЭВО!');
    }
  }

  // ============ ОТРИСОВКА ============
  function getGarrisonCount(p) { return p.garrison.filter(u => u.hp > 0).length; }
  function getGarrisonPower(p) {
    return p.garrison.reduce((s, u) => {
      if (u.hp <= 0) return s;
      const t = UNIT_TYPES[u.type];
      return s + t.avgDamage + t.ac + (u.hp/u.maxHp)*10;
    }, 0);
  }

  function drawGalaxy() {
    ctx.clearRect(0, 0, W, H);
    const offX = cam.x * zoom, offY = cam.y * zoom;
    const cx_c = cx - offX, cy_c = cy - offY;
    ctx.imageSmoothingEnabled = false;

    planets.forEach(p => {
      if (p.isCore) return;
      const r = p.dist * zoom;
      ctx.beginPath(); ctx.arc(cx_c, cy_c, r, 0, Math.PI*2);
      ctx.strokeStyle = p.type === 'ally' ? 'rgba(74,138,248,0.2)' : p.type === 'enemy' ? 'rgba(248,74,74,0.2)' : 'rgba(255,255,255,0.05)';
      ctx.setLineDash([3, 8]); ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
    });

    planets.forEach(p => {
      p.ang += p.speed * 0.05;
      const x = cx_c + p.dist * zoom * Math.cos(p.ang);
      const y = cy_c + p.dist * zoom * Math.sin(p.ang);
      p.x = cx + p.dist * Math.cos(p.ang);
      p.y = cy + p.dist * Math.sin(p.ang);

      if (p.isCore) {
        const r = p.size * zoom;
        const grd = ctx.createRadialGradient(cx_c, cy_c, 0, cx_c, cy_c, r*1.8);
        grd.addColorStop(0, '#ffffff');
        grd.addColorStop(0.15, '#ffdd44');
        grd.addColorStop(0.5, '#ff8800');
        grd.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(cx_c - r*2, cy_c - r*2, r*4, r*4);
        ctx.fillStyle = '#ffd700';
        ctx.font = `bold ${Math.max(16, 26*zoom)}px 'Press Start 2P'`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('☢', cx_c, cy_c);
        ctx.fillStyle = '#ffaa00';
        ctx.font = `bold ${Math.max(8, 12*zoom)}px 'Press Start 2P'`;
        ctx.textBaseline = 'bottom';
        ctx.fillText('СОЛНЕЧНОЕ ЯДРО', cx_c, cy_c - r - 6);
        ctx.textBaseline = 'top';
        ctx.fillText(`☢${gameState.coreEnergy}`, cx_c, cy_c + r + 6);
        return;
      }

      const r = p.size * zoom;
      ctx.fillStyle = p.type === 'ally' ? '#4a8af8' : p.type === 'enemy' ? '#f84a4a' : '#6a6a8a';
      ctx.fillRect(x - r/2, y - r/2, r, r);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(x - r/4, y - r/4, r/2, r/2);

      if (p.id === gameState.selectedPlanetId) {
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 4;
        ctx.strokeRect(x - r/2 - 4, y - r/2 - 4, r + 8, r + 8);
        const t = Date.now() / 400;
        ctx.fillStyle = `rgba(255,215,0,${0.5 + Math.sin(t)*0.3})`;
        ctx.fillRect(x - 5, y + r/2 + 6, 10, 10);
      }

      ctx.fillStyle = '#b8dff0';
      ctx.font = `${Math.max(7, 10*zoom)}px 'Press Start 2P'`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(p.name, x, y - r/2 - 5);

      const cnt = getGarrisonCount(p);
      ctx.fillStyle = p.type === 'ally' ? '#4fc3f7' : p.type === 'enemy' ? '#ff5252' : '#8ab4d6';
      ctx.textBaseline = 'top';
      ctx.fillText(`x${cnt}`, x, y + r/2 + 8);
    });

    flyingUnits.forEach(f => {
      const fx = cx_c + (f.x - cx) * zoom;
      const fy = cy_c + (f.y - cy) * zoom;
      ctx.fillStyle = f.owner === 'ally' ? '#4fc3f7' : '#ff5252';
      ctx.fillRect(fx - 4, fy - 4, 8, 8);
    });

    updateUIStats();
  }

  // ============ ВЫБОР ПЛАНЕТЫ ============
  function selectPlanet(id) {
    gameState.selectedPlanetId = id;
    const p = planets.find(pl => pl.id === id);
    if (!p) return;
    document.getElementById('selectedPlanet').textContent = p.name;
    document.getElementById('selectedOwner').textContent = p.type === 'ally' ? 'АЛЬЯНС' : p.type === 'enemy' ? 'УЛЕЙ' : 'НЕЙТРАЛ';
    updateGarrisonDisplay();
    updateRecruitGrid();
  }

  function updateGarrisonDisplay() {
    const p = planets.find(pl => pl.id === gameState.selectedPlanetId);
    if (!p) return;
    const grid = document.getElementById('garrisonGrid');
    grid.innerHTML = '';
    const alive = p.garrison.filter(u => u.hp > 0);
    if (alive.length === 0) {
      grid.innerHTML = '<div class="garrison-unit" style="grid-column:1/-1;">НЕТ</div>';
    } else {
      alive.forEach(u => {
        const ut = UNIT_TYPES[u.type];
        const d = document.createElement('div');
        d.className = 'garrison-unit';
        d.innerHTML = `${ut.icon}<br>${ut.name}<br>${u.hp}/${u.maxHp}`;
        grid.appendChild(d);
      });
    }
  }

  function updateRecruitGrid() {
    const p = planets.find(pl => pl.id === gameState.selectedPlanetId);
    const grid = document.getElementById('recruitGrid');
    grid.innerHTML = '';
    if (!p || p.type !== 'ally') {
      grid.innerHTML = '<div style="grid-column:1/-1;color:#6a6a8a;text-align:center;font-size:7px;">ТОЛЬКО АЛЬЯНС</div>';
      return;
    }
    ['astronaut', 'mine', 'warhead', 'turret', 'spaceship', 'rocket', 'starbase'].forEach(type => {
      const ut = UNIT_TYPES[type];
      const card = document.createElement('div');
      card.className = 'unit-recruit-card';
      card.innerHTML = `<div class="recruit-icon">${ut.icon}</div><div class="recruit-name">${ut.name}</div><div class="recruit-cost">${ut.cost}КР</div>`;
      card.addEventListener('click', (e) => { e.stopPropagation(); recruitUnit(type); });
      grid.appendChild(card);
    });
  }

  function recruitUnit(utype) {
    if (battleState || gameState.gameOver) return;
    const p = planets.find(pl => pl.id === gameState.selectedPlanetId);
    if (!p || p.type !== 'ally') return;
    const ut = UNIT_TYPES[utype];
    if (gameState.credits < ut.cost) return addLog('НЕТ КРЕДИТОВ!');
    gameState.credits -= ut.cost;
    p.garrison.push({ type: utype, hp: ut.hp, maxHp: ut.hp });
    if (navigator.vibrate) navigator.vibrate(15);
    addLog(`ВЕРБОВКА: ${ut.name}`);
    selectPlanet(p.id);
    saveGame();
  }

  function renderEvolution() {
    const grid = document.getElementById('evolutionGrid');
    grid.innerHTML = '';
    EVOLUTION.forEach(upg => {
      const card = document.createElement('div');
      card.className = 'evo-card';
      if (gameState.purchasedUpgrades.includes(upg.id)) card.classList.add('purchased');
      const isLocked = upg.requires && !gameState.purchasedUpgrades.includes(upg.requires);
      if (isLocked) card.classList.add('locked');
      const canBuy = !gameState.purchasedUpgrades.includes(upg.id) && !isLocked && gameState.evolutionPoints >= upg.cost;
      card.innerHTML = `<div class="evo-name">${upg.name}</div><div style="font-size:6px;color:#8ab4f8;">${upg.desc}</div><div class="evo-cost">★${upg.cost}</div>`;
      if (canBuy) card.addEventListener('click', (e) => { e.stopPropagation(); purchaseUpgrade(upg); });
      grid.appendChild(card);
    });
  }

  function purchaseUpgrade(upg) {
    if (gameState.purchasedUpgrades.includes(upg.id)) return;
    if (upg.requires && !gameState.purchasedUpgrades.includes(upg.requires)) return;
    if (gameState.evolutionPoints < upg.cost) return addLog('НЕТ ЭВО!');
    gameState.evolutionPoints -= upg.cost;
    gameState.purchasedUpgrades.push(upg.id);
    if (upg.effect.ac) gameState.modifiers.ac += upg.effect.ac;
    if (upg.effect.attackBonus) gameState.modifiers.attackBonus += upg.effect.attackBonus;
    if (upg.effect.enemyDebuff) gameState.modifiers.enemyDebuff += upg.effect.enemyDebuff;
    if (upg.effect.corePerTurn) gameState.modifiers.corePerTurn += upg.effect.corePerTurn;
    if (navigator.vibrate) navigator.vibrate([10, 20, 10]);
    addLog(`ИССЛЕДОВАНО: ${upg.name}!`);
    renderEvolution();
  }

  // ============ КНОПКИ ============
  document.getElementById('btnAttack').addEventListener('click', () => {
    if (battleState || gameState.gameOver) return;
    if (gameState.selectedPlanetId === null) return addLog('ВЫБЕРИ ПЛАНЕТУ!');
    const p = planets.find(pl => pl.id === gameState.selectedPlanetId);
    if (!p || p.type !== 'ally') return addLog('ТОЛЬКО АЛЬЯНС!');
    if (!p.garrison.some(u => u.hp > 0)) return addLog('НЕТ ЮНИТОВ!');
    isAttackMode = !isAttackMode;
    document.getElementById('btnAttack').textContent = isAttackMode ? 'ТАП ЦЕЛЬ' : '⚔ АТАКА';
    if (isAttackMode && navigator.vibrate) navigator.vibrate(20);
  });

  document.getElementById('btnNextTurn').addEventListener('click', nextTurn);

  function nextTurn() {
    if (battleState) return addLog('ИДЁТ БИТВА!');
    if (isAttackMode) return addLog('ОТМЕНИ АТАКУ!');
    if (gameState.gameOver) return;

    gameState.turn++; gameState.wave++;
    harvestCoreEnergy();

    const allies = planets.filter(p => p.type === 'ally');
    gameState.credits += allies.length * 12;
    allies.forEach(p => { if (p.special?.bonus === 'credits') gameState.credits += p.special.value; });

    const enemyP = planets.find(p => p.type === 'enemy');
    if (enemyP) {
      if (gameState.wave % 3 === 0) {
        const types = ['mine_invader', 'roach_bot', 'roach_bot', 'leviathan'];
        if (gameState.wave >= 8) types.push('leviathan_maw');
        if (gameState.wave >= 15) types.push('big_leviathan');
        const t = types[Math.floor(Math.random()*types.length)];
        enemyP.garrison.push({ type: t, hp: UNIT_TYPES[t].hp, maxHp: UNIT_TYPES[t].hp });
      }
      if (allies.length > 0 && enemyP.garrison.filter(u => u.hp > 0).length > 3) {
        let target = allies.reduce((a, b) => getGarrisonPower(a) < getGarrisonPower(b) ? a : b);
        const att = [], rem = [];
        enemyP.garrison.forEach(u => { if (u.hp > 0 && att.length < 3) { att.push({...u}); u.hp = 0; } else if (u.hp > 0) rem.push(u); });
        enemyP.garrison = rem;
        att.forEach(u => { flyingUnits.push({ x: enemyP.x, y: enemyP.y, tx: target.x, ty: target.y, owner: 'enemy', sId: enemyP.id, tId: target.id, progress: 0, unitType: u.type, hp: u.hp, maxHp: u.maxHp }); });
        addLog(`РОЙ АТАКУЕТ ${target.name}!`);
      }
    }

    checkGameOver();
    addLog(`ЦИКЛ ${gameState.turn}`);
    saveGame();
  }

  // ============ D20 ============
  function rollD20() { return Math.floor(Math.random() * 20) + 1; }
  function showD20(r, crit, fail) {
    const inner = document.getElementById('pixelD20');
    document.getElementById('d20Number').textContent = r;
    inner.className = 'pixel-d20-inner';
    if (crit) inner.classList.add('crit');
    if (fail) inner.classList.add('crit-fail');
    setTimeout(() => inner.className = 'pixel-d20-inner', 800);
  }

  // ============ БИТВА ============
  function startBattle(planet, attackingUnits, attackerOwner) {
    if (battleState || gameState.gameOver) return;
    const defUnits = planet.garrison.filter(u => u.hp > 0).map(u => ({...u}));
    const attUnits = attackingUnits.map(u => ({...u}));
    if (attackerOwner === 'ally' && defUnits.length === 0 && planet.type === 'neutral') { capturePlanet(planet, attUnits); return; }

    document.getElementById('battle-overlay').style.display = 'flex';
    document.getElementById('battle-title').textContent = `БИТВА У ${planet.name}`;
    document.getElementById('battle-round').textContent = '1';
    document.getElementById('d20Number').textContent = '?';
    document.getElementById('pixelD20').className = 'pixel-d20-inner';

    battleState = { planet, allyUnits: attackerOwner==='ally'?attUnits:defUnits, enemyUnits: attackerOwner==='enemy'?attUnits:defUnits, isPlayerTurn: true, round: 1, selectedUnitIndex: null };
    if (attackerOwner==='enemy' && planet.type==='ally') { battleState.allyUnits = defUnits; battleState.enemyUnits = attUnits; }

    renderBattle();
    document.getElementById('battle-turn-info').textContent = 'БРОСОК ИНИЦИАТИВЫ...';
    document.getElementById('btnBattleAttack').disabled = true;
    document.getElementById('btnBattleEndTurn').disabled = true;
    if (navigator.vibrate) navigator.vibrate([20, 50, 20]);

    setTimeout(() => {
      const pR = rollD20()+gameState.modifiers.attackBonus, eR = rollD20();
      showD20(pR, pR>=20, pR===1);
      battleState.isPlayerTurn = pR >= eR;
      document.getElementById('battle-turn-info').textContent = battleState.isPlayerTurn ? 'ВАШ ХОД' : 'ХОД ВРАГА';
      document.getElementById('btnBattleEndTurn').disabled = battleState.isPlayerTurn;
      if (!battleState.isPlayerTurn) setTimeout(executeEnemyTurn, 600);
      addBattleLog(`ИНИЦ: ${pR} против ${eR}`);
    }, 400);
  }

  function renderBattle() {
    if (!battleState) return;
    const ag = document.getElementById('allyUnits'), eg = document.getElementById('enemyUnits');
    ag.innerHTML = ''; eg.innerHTML = '';
    battleState.allyUnits.forEach((u, i) => {
      if (u.hp <= 0) return;
      const ut = UNIT_TYPES[u.type];
      const card = document.createElement('div');
      card.className = 'battle-unit-card';
      if (battleState.selectedUnitIndex === i && battleState.isPlayerTurn) card.classList.add('selected');
      card.innerHTML = `<div class="unit-sprite">${ut.icon}</div><div class="unit-name">${ut.name}</div><div class="unit-hp-bar"><div class="unit-hp-fill ${u.hp/u.maxHp<0.3?'low':u.hp/u.maxHp<0.6?'medium':''}" style="width:${(u.hp/u.maxHp)*100}%"></div></div><div>${u.hp}/${u.maxHp}</div>`;
      if (battleState.isPlayerTurn) card.addEventListener('click', (e) => { e.stopPropagation(); selectBattleUnit(i); });
      ag.appendChild(card);
    });
    battleState.enemyUnits.forEach(u => {
      if (u.hp <= 0) return;
      const ut = UNIT_TYPES[u.type];
      const card = document.createElement('div');
      card.className = 'battle-unit-card';
      card.innerHTML = `<div class="unit-sprite">${ut.icon}</div><div class="unit-name">${ut.name}</div><div class="unit-hp-bar"><div class="unit-hp-fill ${u.hp/u.maxHp<0.3?'low':u.hp/u.maxHp<0.6?'medium':''}" style="width:${(u.hp/u.maxHp)*100}%"></div></div><div>${u.hp}/${u.maxHp}</div>`;
      eg.appendChild(card);
    });
    document.getElementById('battle-round').textContent = battleState.round;
    document.getElementById('btnBattleAttack').disabled = !battleState.isPlayerTurn || battleState.selectedUnitIndex === null;
    document.getElementById('btnBattleEndTurn').disabled = !battleState.isPlayerTurn;
  }

  function selectBattleUnit(i) {
    if (!battleState || !battleState.isPlayerTurn) return;
    battleState.selectedUnitIndex = i;
    document.getElementById('btnBattleAttack').disabled = false;
    if (navigator.vibrate) navigator.vibrate(8);
    renderBattle();
  }

  function executePlayerAttack() {
    if (!battleState || !battleState.isPlayerTurn || battleState.selectedUnitIndex === null) return;
    const attacker = battleState.allyUnits[battleState.selectedUnitIndex];
    if (!attacker || attacker.hp <= 0) return;
    const aliveEnemies = battleState.enemyUnits.filter(u => u.hp > 0);
    if (aliveEnemies.length === 0) { endBattle(true); return; }
    const target = aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
    const atk = UNIT_TYPES[attacker.type], def = UNIT_TYPES[target.type];
    const effAC = Math.max(1, def.ac - Math.floor(gameState.modifiers.enemyDebuff*10));
    const roll = rollD20();
    const total = roll + atk.attackBonus + gameState.modifiers.attackBonus;
    const crit = roll >= 20, fail = roll === 1;
    showD20(roll, crit, fail);
    if (navigator.vibrate) navigator.vibrate(crit ? [15,30,15,30,15] : fail ? [30] : [10]);

    if (fail) { addBattleLog('КРИТ-ПРОВАЛ! ПРОМАХ!'); }
    else if (crit || total >= effAC) {
      let dmg = parseDamage(atk.damage);
      if (crit) dmg *= 2;
      if (atk.special === 'камикадзе') { dmg *= 2; attacker.hp = 0; addBattleLog('МИНА УНИЧТОЖЕНА!'); }
      if (atk.special === 'залп') dmg = Math.floor(dmg*1.3);
      if (atk.special === 'ямато') dmg = Math.floor(dmg*1.5);
      target.hp -= dmg;
      if (target.hp <= 0) { target.hp = 0; addBattleLog(`УБИТ! ${dmg} УРОНА`); }
      else { addBattleLog(`ПОПАДАНИЕ: ${dmg} УРОНА`); }
    } else { addBattleLog(`ПРОМАХ (${total} против ${effAC})`); }

    battleState.selectedUnitIndex = null;
    document.getElementById('btnBattleAttack').disabled = true;
    renderBattle();
    if (battleState.enemyUnits.every(u => u.hp <= 0)) endBattle(true);
  }

  function executeEnemyTurn() {
    if (!battleState) return;
    const aliveEnemies = battleState.enemyUnits.filter(u => u.hp > 0);
    const aliveAllies = battleState.allyUnits.filter(u => u.hp > 0);
    if (aliveAllies.length === 0) { endBattle(false); return; }
    aliveEnemies.forEach(enemy => {
      if (aliveAllies.length === 0) return;
      const target = aliveAllies[Math.floor(Math.random()*aliveAllies.length)];
      const atk = UNIT_TYPES[enemy.type], def = UNIT_TYPES[target.type];
      const effAC = def.ac + gameState.modifiers.ac;
      const roll = rollD20();
      if (roll === 1) { addBattleLog('ВРАГ: КРИТ-ПРОВАЛ!'); }
      else if (roll >= 20 || roll+atk.attackBonus >= effAC) {
        let dmg = parseDamage(atk.damage);
        if (roll >= 20) dmg *= 2;
        if (atk.special === 'камикадзе') { dmg *= 2; enemy.hp = 0; }
        if (atk.special === 'крушитель') aliveAllies.forEach(u => { if (u!==target) u.hp -= Math.floor(dmg*0.3); });
        if (atk.special === 'глотка') dmg = Math.floor(dmg*1.4);
        if (atk.special === 'выводок' && Math.random()<0.3) { battleState.enemyUnits.push({type:'roach_bot',hp:45,maxHp:45}); addBattleLog('УЛЕЙ ВЫВЕЛ ДРОНА!'); }
        target.hp -= dmg;
        if (target.hp <= 0) { target.hp = 0; addBattleLog(`ВРАГ УБИЛ! ${dmg} УРОНА`); }
        else { addBattleLog(`ВРАГ ПОПАЛ: ${dmg} УРОНА`); }
      } else { addBattleLog('ВРАГ ПРОМАХНУЛСЯ'); }
    });
    battleState.round++;
    battleState.isPlayerTurn = true;
    document.getElementById('battle-turn-info').textContent = 'ВАШ ХОД';
    document.getElementById('btnBattleEndTurn').disabled = false;
    document.getElementById('btnBattleAttack').disabled = true;
    battleState.selectedUnitIndex = null;
    renderBattle();
    if (battleState.allyUnits.every(u => u.hp <= 0)) endBattle(false);
  }

  document.getElementById('btnBattleAttack').addEventListener('click', executePlayerAttack);
  document.getElementById('btnBattleEndTurn').addEventListener('click', () => {
    if (!battleState || !battleState.isPlayerTurn) return;
    battleState.isPlayerTurn = false;
    document.getElementById('battle-turn-info').textContent = 'ХОД ВРАГА...';
    document.getElementById('btnBattleEndTurn').disabled = true;
    document.getElementById('btnBattleAttack').disabled = true;
    battleState.selectedUnitIndex = null;
    renderBattle();
    setTimeout(executeEnemyTurn, 600);
  });
  document.getElementById('btnBattleRetreat').addEventListener('click', () => { if (battleState) endBattle(false, true); });

  function endBattle(isAllyWin) {
    if (!battleState) return;
    document.getElementById('battle-overlay').style.display = 'none';
    const p = battleState.planet;
    if (isAllyWin) {
      const survivors = battleState.allyUnits.filter(u => u.hp > 0);
      if (p.type === 'enemy') { if (survivors.length > 0) capturePlanet(p, survivors); else { addLog('НИЧЬЯ'); p.garrison = []; } }
      else if (p.type === 'neutral') capturePlanet(p, survivors);
      else { p.garrison = survivors; addLog('ЗАЩИЩЕНА'); }
    } else {
      if (p.type === 'ally') { p.garrison = []; p.type = 'neutral'; addLog('ПОТЕРЯНА!'); }
      else if (p.type === 'neutral') { p.garrison = battleState.enemyUnits.filter(u => u.hp > 0); p.type = 'enemy'; addLog('УЛЕЙ ЗАХВАТИЛ'); }
      checkGameOver();
    }
    if (navigator.vibrate) navigator.vibrate(isAllyWin ? [20,40,20,40,20] : [50,100]);
    battleState = null;
    selectPlanet(p.id);
  }

  function capturePlanet(planet, survivors) {
    planet.garrison = survivors; planet.type = 'ally'; gameState.evolutionPoints += 1;
    if (planet.special?.bonus === 'freeUnit') for (let i=0; i<(planet.special.count||1); i++) { const ut = UNIT_TYPES[planet.special.value]; planet.garrison.push({type:planet.special.value,hp:ut.hp,maxHp:ut.hp}); }
    if (planet.special?.bonus === 'evo') gameState.evolutionPoints += planet.special.value;
    addLog(`ЗАХВАЧЕНА! +1 ЭВО`);
  }

  function addBattleLog(msg) {
    const log = document.getElementById('battleLog');
    const lines = log.innerHTML.split('<br>'); lines.push(msg);
    if (lines.length > 4) lines.shift();
    log.innerHTML = lines.join('<br>'); log.scrollTop = log.scrollHeight;
  }

  function checkGameOver() {
    const allies = planets.filter(p => p.type === 'ally');
    const enemy = planets.find(p => p.type === 'enemy');
    const earth = planets.find(p => p.id === 3);
    if (!enemy || enemy.type === 'ally') endGame(true);
    else if (earth.type !== 'ally' || earth.garrison.every(u => u.hp <= 0)) endGame(false);
  }

  function endGame(isVictory) {
    gameState.gameOver = true;
    document.getElementById('game-over-overlay').style.display = 'flex';
    const allies = planets.filter(p => p.type === 'ally').length;
    const total = planets.filter(p => !p.isCore).length;
    document.getElementById('game-over-title').textContent = isVictory ? 'ПОБЕДА!' : 'ПОРАЖЕНИЕ';
    document.getElementById('game-over-title').style.color = isVictory ? '#ffd700' : '#ff5252';
    document.getElementById('game-over-rating').textContent = isVictory ? (allies/total>0.8?'S':allies/total>0.5?'A':'B') : 'D';
    document.getElementById('game-over-stats').textContent = `ЦИКЛ ${gameState.turn} | ПЛАНЕТ ${allies}/${total}`;
  }

  // ============ СОХРАНЕНИЯ ============
  function saveGame() {
    const sd = {
      gameState: JSON.parse(JSON.stringify(gameState)),
      planetsData: planets.map(p => ({ id: p.id, type: p.type, ang: p.ang, garrison: p.garrison.map(u => ({ type: u.type, hp: u.hp, maxHp: u.maxHp })) })),
      flyingUnits: flyingUnits.map(f => ({ sId: f.sId, tId: f.tId, owner: f.owner, progress: f.progress, unitType: f.unitType, hp: f.hp, maxHp: f.maxHp, x: f.x, y: f.y, tx: f.tx, ty: f.ty }))
    };
    localStorage.setItem('cosmicFrontRU', JSON.stringify(sd));
  }

  function loadGame() {
    const d = localStorage.getItem('cosmicFrontRU');
    if (!d) return addLog('НЕТ СОХРАНЕНИЯ');
    try {
      const sd = JSON.parse(d);
      gameState = sd.gameState;
      sd.planetsData.forEach(pd => { const p = planets.find(p => p.id === pd.id); if (p) { p.type = pd.type; p.ang = pd.ang; p.garrison = pd.garrison; } });
      flyingUnits = sd.flyingUnits;
      battleState = null; isAttackMode = false;
      document.getElementById('battle-overlay').style.display = 'none';
      document.getElementById('btnAttack').textContent = '⚔ АТАКА';
      selectPlanet(gameState.selectedPlanetId);
      renderEvolution();
      updateRecruitGrid();
      addLog('ЗАГРУЖЕНО');
    } catch (e) { addLog('ОШИБКА ЗАГРУЗКИ'); }
  }

  document.getElementById('btnSave').addEventListener('click', () => { saveGame(); addLog('СОХРАНЕНО'); });
  document.getElementById('btnLoad').addEventListener('click', loadGame);

  // ============ ГЛАВНЫЙ ЦИКЛ ============
  function updateGameLoop() {
    if (gameState.gameOver) { drawGalaxy(); requestAnimationFrame(updateGameLoop); return; }
    for (let i = flyingUnits.length-1; i >= 0; i--) {
      const f = flyingUnits[i];
      f.progress += 0.03;
      if (f.progress >= 1) {
        const tP = planets.find(p => p.id === f.tId);
        if (tP) startBattle(tP, [{ type: f.unitType, hp: f.hp, maxHp: f.maxHp }], f.owner);
        flyingUnits.splice(i, 1);
      } else { f.x += (f.tx - f.x)*0.07; f.y += (f.ty - f.y)*0.07; }
    }
    drawGalaxy();
    requestAnimationFrame(updateGameLoop);
  }

  function updateUIStats() {
    document.getElementById('creditsValue').textContent = gameState.credits;
    document.getElementById('evoPointsValue').textContent = gameState.evolutionPoints;
    document.getElementById('coreValue').textContent = gameState.coreEnergy;
    document.getElementById('waveCounter').textContent = gameState.wave;
    document.getElementById('turnCounter').textContent = gameState.turn;
    const allies = planets.filter(p => p.type === 'ally').length;
    const total = planets.filter(p => !p.isCore).length;
    document.getElementById('planetCountValue').textContent = `${allies}/${total}`;
    const ap = planets.filter(p => p.type === 'ally').reduce((s, p) => s + getGarrisonPower(p), 0);
    const ep = planets.filter(p => p.type === 'enemy').reduce((s, p) => s + getGarrisonPower(p), 0);
    document.getElementById('strengthFill').style.width = (ap/(ap+ep||1)*100) + '%';
  }

  function addLog(m) {
    const lp = document.getElementById('logPanel');
    const lines = lp.innerHTML.split('<br>'); lines.push(m);
    if (lines.length > 4) lines.shift();
    lp.innerHTML = lines.join('<br>'); lp.scrollTop = lp.scrollHeight;
  }

  // ============ ИНИЦИАЛИЗАЦИЯ ============
  function init() {
    createStars();
    initGarrisons();
    selectPlanet(3);
    renderEvolution();
    updateRecruitGrid();
    addLog('КОСМО-ФРОНТ ГОТОВ');
    addLog('ТАП СОЛНЦЕ ☢ ЭНЕРГИЯ');
    updateGameLoop();
  }
  init();
})();
</script>
</body>
</html>
