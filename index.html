<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Космический Фронт v30</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #000; font-family: 'Press Start 2P', cursive;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; min-height: 100dvh; image-rendering: pixelated;
      background: #000;
      touch-action: manipulation; -webkit-touch-callout: none;
      -webkit-user-select: none; user-select: none; overflow: hidden;
      position: fixed; width: 100vw; height: 100vh; height: 100dvh;
    }

    #mode-select-overlay {
      display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; justify-content: center; align-items: center;
      flex-direction: column; gap: 30px;
    }
    #mode-select-box {
      background: #000; border: 8px solid #fff;
      padding: 40px 30px; text-align: center; color: #fff;
      max-width: 500px; width: 90%;
    }
    #mode-select-box h2 { font-size: 16px; margin-bottom: 10px; color: #0ff; }
    #mode-select-box p { font-size: 9px; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
    .mode-btn {
      padding: 20px 30px; border: 6px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 14px;
      cursor: pointer; touch-action: manipulation; margin: 10px;
      transition: all 0.1s;
    }
    .mode-btn:hover, .mode-btn:active { background: #fff; color: #000; }
    .mode-btn.pc { border-color: #4af; color: #4af; }
    .mode-btn.pc:hover, .mode-btn.pc:active { background: #4af; color: #000; }
    .mode-btn.mobile { border-color: #f44; color: #faa; }
    .mode-btn.mobile:hover, .mode-btn.mobile:active { background: #f44; color: #000; }

    .pda-container {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; border: 4px solid #fff;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .header {
      background: #000; border-bottom: 4px solid #fff;
      padding: 8px 16px; display: flex; justify-content: space-between; align-items: center;
      color: #fff; font-size: 10px; z-index: 10; flex-shrink: 0; min-height: 38px;
    }
    .resources-bar {
      background: #000; border-bottom: 2px solid #fff;
      padding: 6px 16px; display: flex; gap: 16px; flex-wrap: wrap;
      z-index: 10; flex-shrink: 0; font-size: 8px;
    }
    .resource { display: flex; align-items: center; gap: 6px; color: #fff; }
    .resource-value { font-size: 12px; font-weight: bold; color: #0ff; }
    .main-content { display: flex; flex: 1; overflow: hidden; position: relative; flex-direction: row; }
    .galaxy-map { flex: 1; background: #000; position: relative; overflow: hidden; min-width: 0; }
    #galaxy-canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    .star-bg { position: absolute; width: 2px; height: 2px; background: #fff; pointer-events: none; z-index: 1; }
    .map-controls { position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 20; }
    .map-btn {
      width: 50px; height: 50px; border: 4px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 20px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; touch-action: manipulation;
    }
    .map-btn:active { background: #fff; color: #000; }
    .side-panel {
      width: 240px; min-width: 200px; background: #000;
      display: flex; flex-direction: column; gap: 6px; padding: 8px;
      overflow-y: auto; flex-shrink: 0; z-index: 10; font-size: 7px;
      border-left: 4px solid #fff;
    }
    .panel-section { background: #000; border: 4px solid #fff; padding: 8px; }
    .section-title { color: #0ff; font-size: 9px; margin-bottom: 6px; border-bottom: 2px solid #fff; padding-bottom: 4px; text-align: center; }
    .unit-recruit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .unit-recruit-card {
      background: #000; border: 4px solid #fff;
      padding: 10px 6px; cursor: pointer; text-align: center; font-size: 6px;
      touch-action: manipulation; min-height: 55px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .unit-recruit-card:active { border-color: #0ff; background: #222; }
    .recruit-name { color: #fff; margin: 3px 0; font-size: 7px; }
    .recruit-cost { color: #0ff; font-size: 6px; }
    .evolution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .evo-card {
      background: #000; border: 4px solid #fff;
      padding: 10px 8px; cursor: pointer; position: relative; font-size: 6px;
      touch-action: manipulation; min-height: 44px;
    }
    .evo-card:active:not(.purchased):not(.locked) { border-color: #0ff; background: #222; }
    .evo-card.purchased { opacity: 0.4; border-color: #4a4; pointer-events: none; }
    .evo-card.locked { opacity: 0.3; cursor: not-allowed; }
    .evo-card.purchased::after { content: '✓'; position: absolute; top: 4px; right: 6px; color: #0f0; font-size: 14px; }
    .evo-name { color: #fff; font-size: 8px; margin-bottom: 3px; }
    .evo-cost { color: #0ff; font-size: 7px; }
    .action-buttons { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .btn {
      flex: 1; padding: 14px 10px; min-width: 60px;
      border: 4px solid #fff; background: #000;
      color: #fff; font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; touch-action: manipulation;
    }
    .btn:active:not(:disabled) { background: #fff; color: #000; }
    .btn.attack { border-color: #f44; color: #faa; }
    .btn.save { border-color: #4a4; color: #afa; }
    .btn.transfer { border-color: #4af; color: #aaf; }
    .log-panel { background: #000; border: 4px solid #fff; padding: 6px; color: #fff; font-size: 6px; height: 44px; overflow-y: auto; }
    .planet-info-box { font-size: 8px; color: #fff; }
    .garrison-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 4px; }
    .garrison-unit {
      background: #000; border: 4px solid #fff;
      padding: 6px; text-align: center; font-size: 7px; color: #fff;
      cursor: pointer;
    }
    .garrison-unit:active { border-color: #0ff; background: #222; }
    .garrison-unit.selected-for-attack { border-color: #0ff !important; background: #222 !important; }
    .garrison-unit.selected-for-transfer { border-color: #4af !important; background: #223 !important; }
    .squad-info { color: #0ff; font-size: 7px; margin-top: 3px; text-align: center; min-height: 16px; }

    #battle-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 50; justify-content: center; align-items: center;
    }
    #battle-box {
      background: #000; border: 8px solid #fff;
      padding: 0; width: 90%; max-width: 750px; max-height: 90%;
      display: flex; flex-direction: column;
    }
    #battle-header {
      background: #000; border-bottom: 4px solid #fff;
      padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    }
    #battle-title { font-size: 14px; color: #0ff; }
    .battle-content { display: flex; flex-direction: column; flex: 1; }
    .battle-enemy-area {
      padding: 20px; display: flex; justify-content: center; align-items: center;
      gap: 20px; flex-wrap: wrap; min-height: 120px;
    }
    .enemy-sprite {
      width: 64px; height: 64px; border: 4px solid #f44;
      display: flex; flex-direction: column; align-items: center;
      background: #100; position: relative; cursor: pointer;
    }
    .enemy-sprite canvas { width: 48px; height: 48px; image-rendering: pixelated; }
    .enemy-sprite.selected { border-color: #0ff !important; animation: pulse 0.3s infinite; }
    .enemy-info { font-size: 6px; color: #fff; margin-top: 2px; text-align: center; }
    .enemy-hp-bar { width: 100%; height: 5px; background: #400; border: 2px solid #fff; margin-top: 2px; }
    .enemy-hp-fill { height: 100%; background: #f00; transition: width 0.3s; }
    .battle-ally-area {
      padding: 14px; display: flex; justify-content: center; align-items: center;
      gap: 12px; flex-wrap: wrap; min-height: 80px;
      border-top: 4px solid #fff;
    }
    .ally-sprite {
      width: 56px; height: 56px; border: 4px solid #4af;
      display: flex; flex-direction: column; align-items: center;
      background: #001; cursor: pointer;
    }
    .ally-sprite canvas { width: 40px; height: 40px; image-rendering: pixelated; }
    .ally-sprite.acted { opacity: 0.3; pointer-events: none; }
    .ally-sprite.selected { border-color: #0ff !important; animation: pulse 0.3s infinite; }
    .ally-info { font-size: 5px; color: #fff; margin-top: 2px; text-align: center; }
    .ally-hp-bar { width: 100%; height: 4px; background: #001; border: 1px solid #fff; margin-top: 1px; }
    .ally-hp-fill { height: 100%; background: #0f0; transition: width 0.3s; }
    .ally-hp-fill.low { background: #f00; }
    .ally-hp-fill.medium { background: #ff0; }
    @keyframes pulse { 0%,100% { border-color: #0ff; } 50% { border-color: #fff; } }
    .battle-ui {
      background: #000; border-top: 4px solid #fff;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .battle-text {
      background: #000; border: 4px solid #fff;
      padding: 10px; min-height: 40px; font-size: 10px; color: #fff; line-height: 1.5;
    }
    .battle-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .battle-menu-btn {
      padding: 14px; border: 4px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; touch-action: manipulation;
    }
    .battle-menu-btn:active { background: #fff; color: #000; }
    .d20-popup {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 64px; height: 64px; z-index: 30; pointer-events: none; display: none;
    }
    .d20-popup-inner {
      width: 100%; height: 100%; background: #fff;
      display: flex; justify-content: center; align-items: center;
      font-family: 'Press Start 2P', cursive; font-size: 24px; color: #000;
      border: 4px solid #000;
    }
    .d20-popup-inner.crit { background: #f44; color: #fff; animation: shake 0.1s infinite; }
    @keyframes shake { 0%,100% { transform: translate(0,0); } 50% { transform: translate(3px,-3px); } }

    .notification-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 80; justify-content: center; align-items: center;
    }
    .notification-box {
      background: #000; border: 8px solid #fff;
      padding: 24px; text-align: center; color: #fff; font-size: 10px;
      max-width: 400px; width: 90%;
    }
    .notification-box h2 { font-size: 18px; margin-bottom: 12px; }
    .btn-close {
      padding: 14px 28px; border: 4px solid #fff;
      background: #000; color: #fff;
      font-family: 'Press Start 2P', cursive; font-size: 10px;
      cursor: pointer; margin-top: 16px; touch-action: manipulation;
    }
    .btn-close:active { background: #fff; color: #000; }

    @media (orientation: portrait) {
      .pda-container.mobile-mode .main-content { flex-direction: column; }
      .pda-container.mobile-mode .galaxy-map { flex: 2; min-height: 50vh; }
      .pda-container.mobile-mode .side-panel {
        width: 100%; min-width: 100%; max-height: 50vh; flex: 1;
        flex-direction: column; gap: 4px; padding: 6px;
        border-left: none; border-top: 4px solid #fff;
        overflow-y: auto; overflow-x: hidden;
        font-size: 7px;
      }
      .pda-container.mobile-mode .panel-section { padding: 6px 8px; }
      .pda-container.mobile-mode .section-title { font-size: 8px; margin-bottom: 4px; }
      .pda-container.mobile-mode .garrison-grid { grid-template-columns: repeat(4, 1fr); gap: 3px; }
      .pda-container.mobile-mode .garrison-unit { font-size: 6px; padding: 4px; }
      .pda-container.mobile-mode .unit-recruit-grid { grid-template-columns: repeat(4, 1fr); gap: 3px; }
      .pda-container.mobile-mode .unit-recruit-card { min-height: 45px; padding: 6px 3px; }
      .pda-container.mobile-mode .evolution-grid { grid-template-columns: repeat(4, 1fr); gap: 3px; }
      .pda-container.mobile-mode .evo-card { min-height: 36px; padding: 6px 4px; }
      .pda-container.mobile-mode .action-buttons { gap: 4px; }
      .pda-container.mobile-mode .btn { padding: 12px 6px; font-size: 8px; }
      .pda-container.mobile-mode .log-panel { height: 36px; }
      .pda-container.mobile-mode .recruit-name { font-size: 6px; }
      .pda-container.mobile-mode .recruit-cost { font-size: 5px; }
    }
  </style>
</head>
<body>
<div id="mode-select-overlay">
  <div id="mode-select-box">
    <h2>ВЫБОР РЕЖИМА</h2>
    <p>Выберите удобный способ управления</p>
    <button class="mode-btn pc" id="btnModePC">🖥 ПК<br><small>МЫШЬ + КЛАВИАТУРА</small></button>
    <button class="mode-btn mobile" id="btnModeMobile">📱 ТЕЛЕФОН<br><small>СЕНСОРНЫЙ ЭКРАН</small></button>
  </div>
</div>

<div class="pda-container" id="pdaContainer" style="display:none;">
  <div class="header">
    <div style="font-size:9px;">ЦИКЛ <span id="turnCounter">1</span> | ВОЛНА <span id="waveCounter">0</span></div>
    <button class="btn-close" id="btnFullscreen" style="padding:6px 12px;font-size:12px;border-color:#0ff;color:#0ff;">⛶</button>
  </div>
  <div class="resources-bar">
    <div class="resource"><span>◆</span><span class="resource-value" id="creditsValue">1000</span><span>КР</span></div>
    <div class="resource"><span>★</span><span class="resource-value" id="evoPointsValue">3</span><span>ЭВО</span></div>
    <div class="resource"><span>☀</span><span class="resource-value" id="coreValue">0/10</span><span>ЭНЕРГИЯ</span></div>
    <div class="resource"><span>●</span><span class="resource-value" id="planetCountValue">2/12</span><span>ПЛН</span></div>
  </div>
  <div class="main-content">
    <div class="galaxy-map" id="galaxyMap"><canvas id="galaxy-canvas"></canvas>
      <div class="map-controls"><button class="map-btn" id="btnZoomIn">+</button><button class="map-btn" id="btnZoomOut">-</button><button class="map-btn" id="btnCenter">*</button></div>
    </div>
    <div class="side-panel">
      <div class="panel-section"><div class="section-title">ПЛАНЕТА</div><div class="planet-info-box"><div>> <span id="selectedPlanet">ТАП</span></div><div>> <span id="selectedOwner">-</span></div></div><div style="color:#aaa;font-size:6px;margin-top:3px;">ГАРНИЗОН:</div><div class="garrison-grid" id="garrisonGrid"><div class="garrison-unit">-</div></div><div class="squad-info" id="squadInfo"></div></div>
      <div class="panel-section"><div class="section-title">ВЕРБОВКА</div><div class="unit-recruit-grid" id="recruitGrid"></div></div>
      <div class="panel-section"><div class="section-title">ЭВОЛЮЦИЯ</div><div class="evolution-grid" id="evolutionGrid"></div></div>
      <div class="panel-section"><div class="section-title">ДЕЙСТВИЯ</div><div class="action-buttons"><button class="btn attack" id="btnAttack">⚔ АТАКА</button><button class="btn transfer" id="btnTransfer">📦 ПЕРЕБРОС</button></div><div class="action-buttons"><button class="btn" id="btnNextTurn">⏭ ХОД</button></div><div class="action-buttons"><button class="btn save" id="btnSave">💾 СОХР</button><button class="btn save" id="btnLoad" style="border-color:#44f;color:#aaf;">📂 ЗАГР</button></div></div>
      <div class="panel-section"><div class="section-title">ЖУРНАЛ</div><div class="log-panel" id="logPanel">ГОТОВ</div></div>
    </div>

    <div id="battle-overlay">
      <div id="battle-box">
        <div id="battle-header"><span id="battle-title">* ПРОТИВНИК ОБНАРУЖЕН</span></div>
        <div class="battle-content">
          <div class="battle-enemy-area" id="battleEnemyArea"></div>
          <div class="battle-ally-area" id="battleAllyArea"></div>
          <div class="battle-ui">
            <div class="battle-text" id="battleText">* Выбери действие.</div>
            <div class="battle-menu" id="battleMenu"></div>
          </div>
        </div>
        <div class="d20-popup" id="d20Popup"><div class="d20-popup-inner" id="d20PopupInner"><span id="d20PopupNum">?</span></div></div>
      </div>
    </div>

    <div class="notification-overlay" id="notificationOverlay">
      <div class="notification-box">
        <h2 id="notifTitle">УВЕДОМЛЕНИЕ</h2>
        <p id="notifText"></p>
        <button class="btn-close" id="btnCloseNotif">ЗАКРЫТЬ</button>
        <button class="btn-close" id="btnNewGame" style="border-color:#4af;color:#aaf;margin-top:8px;">🔄 НОВАЯ ИГРА</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  let controlMode = 'pc';
  const pdaContainer = document.getElementById('pdaContainer');
  const modeOverlay = document.getElementById('mode-select-overlay');

  document.getElementById('btnModePC').addEventListener('click', () => {
    controlMode = 'pc';
    pdaContainer.classList.remove('mobile-mode');
    modeOverlay.style.display = 'none';
    pdaContainer.style.display = 'flex';
    init();
  });

  document.getElementById('btnModeMobile').addEventListener('click', () => {
    controlMode = 'mobile';
    pdaContainer.classList.add('mobile-mode');
    modeOverlay.style.display = 'none';
    pdaContainer.style.display = 'flex';
    init();
  });

  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  const galaxyMap = document.getElementById('galaxyMap');
  let W, H, cx, cy;
  function resizeCanvas() { W = galaxyMap.clientWidth; H = galaxyMap.clientHeight; canvas.width = W; canvas.height = H; cx = W/2; cy = H/2; }
  window.addEventListener('resize', resizeCanvas);

  const btnFullscreen = document.getElementById('btnFullscreen');
  let isFullscreen = false;
  btnFullscreen.addEventListener('click', () => {
    if (!isFullscreen) {
      if (pdaContainer.requestFullscreen) pdaContainer.requestFullscreen();
      else if (pdaContainer.webkitRequestFullscreen) pdaContainer.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', () => { isFullscreen = !!document.fullscreenElement; updateFSBtn(); });
  document.addEventListener('webkitfullscreenchange', () => { isFullscreen = !!document.webkitFullscreenElement; updateFSBtn(); });
  function updateFSBtn() { btnFullscreen.textContent = isFullscreen ? '✕' : '⛶'; btnFullscreen.style.color = isFullscreen ? '#f44' : '#0ff'; btnFullscreen.style.borderColor = isFullscreen ? '#f44' : '#0ff'; resizeCanvas(); }

  function drawMarine(c,x,y,s){c.fillStyle='#334455';c.fillRect(x-s/3,y-s/2,s*2/3,s);c.fillStyle='#fc8';c.fillRect(x-s/5,y-s/2-s/5,s*2/5,s/3);c.fillStyle='#48c';c.fillRect(x-s/4,y,s/2,s/5);c.fillStyle='#adf';c.fillRect(x-s/6,y-s/2-s/4,s/3,s/4);c.fillStyle='#fff';c.fillRect(x-s/8,y-s/2-s/3,s/4,s/5);}
  function drawHeavy(c,x,y,s){c.fillStyle='#456';c.fillRect(x-s/3,y-s/2,s*2/3,s);c.fillStyle='#fc8';c.fillRect(x-s/4,y-s/2-s/5,s/2,s/3);c.fillStyle='#c44';c.fillRect(x-s/3,y-s/2,s*2/3,s/4);c.fillStyle='#fa4';c.fillRect(x-s/6,y-s/4,s/3,s/3);c.fillStyle='#333';c.fillRect(x-s/5,y-s/6,s*2/5,s/4);}
  function drawSniper(c,x,y,s){c.fillStyle='#234';c.fillRect(x-s/3,y-s/2,s*2/3,s);c.fillStyle='#fc8';c.fillRect(x-s/5,y-s/2-s/5,s*2/5,s/3);c.fillStyle='#4a4';c.fillRect(x-s/4,y,s/2,s/5);c.fillStyle='#f44';c.fillRect(x-s/8,y-s/2-s/3,s/4,s/3);c.fillStyle='#000';c.fillRect(x-s/10,y-s/2-s/4,s/5,s/4);}
  function drawEngineer(c,x,y,s){c.fillStyle='#454';c.fillRect(x-s/3,y-s/2,s*2/3,s);c.fillStyle='#fc8';c.fillRect(x-s/5,y-s/2-s/5,s*2/5,s/3);c.fillStyle='#fa0';c.fillRect(x-s/4,y,s/2,s/5);c.fillStyle='#4cf';c.fillRect(x-s/6,y-s/4,s/3,s/4);c.fillStyle='#fff';c.fillRect(x-s/8,y-s/3,s/4,s/5);}
  function drawFighter(c,x,y,s){c.fillStyle='#369';c.fillRect(x-s/3,y-s/4,s*2/3,s/2);c.fillStyle='#fff';c.fillRect(x-s/4,y-s/3,s/2,s/3);c.fillStyle='#f60';c.fillRect(x-s/5,y+s/4,s*2/5,s/5);c.fillStyle='#0cf';c.fillRect(x-s/4,y,s/2,s/6);c.fillStyle='#0ff';c.fillRect(x-s/8,y-s/5,s/4,s/5);}

  let gameState={credits:1000,turn:1,wave:0,evolutionPoints:3,coreEnergy:0,maxCoreEnergy:10,selectedPlanetId:3,modifiers:{ac:0,atk:0,enemyDebuff:0,corePerTurn:1},purchasedUpgrades:[],gameOver:false,attackSquad:[],transferSquad:[],mode:'none'};

  function createStars(){const c=document.getElementById('galaxyMap');c.querySelectorAll('.star-bg').forEach(s=>s.remove());for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star-bg';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.opacity=Math.random()*0.5+0.2;s.style.width='2px';s.style.height='2px';c.appendChild(s);}}

  let cam={x:0,y:0},zoom=1.3;const MIN_ZOOM=0.3,MAX_ZOOM=4.0;
  let isDragging=false,dragStart={x:0,y:0},dragStartCam={x:0,y:0};

  // ===== ИСПРАВЛЕННОЕ СЕНСОРНОЕ ПЕРЕДВИЖЕНИЕ =====
  canvas.addEventListener('pointerdown',(e)=>{
    if(battleState||gameState.gameOver)return;
    isDragging=true;
    dragStart.x=e.clientX;
    dragStart.y=e.clientY;
    dragStartCam.x=cam.x;
    dragStartCam.y=cam.y;
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove',(e)=>{
    if(!isDragging)return;
    const dx=e.clientX-dragStart.x;
    const dy=e.clientY-dragStart.y;
    cam.x=dragStartCam.x-dx/zoom;
    cam.y=dragStartCam.y-dy/zoom;
  });

  canvas.addEventListener('pointerup',(e)=>{
    if(!isDragging)return;
    isDragging=false;
    canvas.releasePointerCapture(e.pointerId);
    if(battleState||gameState.gameOver)return;
    const dx=e.clientX-dragStart.x;
    const dy=e.clientY-dragStart.y;
    // Тап (почти без движения)
    if(Math.hypot(dx,dy)<(controlMode==='mobile'?12:8)){
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left,my=e.clientY-rect.top;
      const wX=(mx-W/2)/zoom+cx+cam.x,wY=(my-H/2)/zoom+cy+cam.y;
      let cp=null;
      for(let p of planets){const px=cx+p.dist*Math.cos(p.ang),py=cy+p.dist*Math.sin(p.ang);if(Math.hypot(wX-px,wY-py)<p.size+(controlMode==='mobile'?16:12)){cp=p;break;}}
      if(cp){
        if(cp.isCore){harvestCoreEnergy();}
        else if(gameState.mode==='attack'&&cp.id!==gameState.selectedPlanetId&&cp.type!=='ally'){executeAttack(cp);}
        else if(gameState.mode==='transfer'&&cp.id!==gameState.selectedPlanetId&&cp.type==='ally'){executeTransfer(cp);}
        else if(gameState.mode==='none'){selectPlanet(cp.id);}
      }
    }
  });

  canvas.addEventListener('pointerleave',()=>{isDragging=false;});

  let ipd=0;
  canvas.addEventListener('touchstart',(e)=>{if(e.touches.length===2){e.preventDefault();ipd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}});
  canvas.addEventListener('touchmove',(e)=>{if(e.touches.length===2&&ipd>0){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,zoom*(d/ipd)));ipd=d;}});
  document.getElementById('btnZoomIn').addEventListener('click',()=>zoom=Math.min(MAX_ZOOM,zoom+0.3));
  document.getElementById('btnZoomOut').addEventListener('click',()=>zoom=Math.max(MIN_ZOOM,zoom-0.3));
  document.getElementById('btnCenter').addEventListener('click',()=>{const e=planets.find(p=>p.id===3);cam.x=-e.dist*Math.cos(e.ang);cam.y=-e.dist*Math.sin(e.ang);zoom=1.3;});

  window.addEventListener('keydown',(e)=>{

    switch(e.key.toLowerCase()){
      case 'a': document.getElementById('btnAttack').click(); break;

      case '1':case '2':case '3':case '4':case '5':case '6':case '7':case '8':case '9':case '0':
        const id = e.key==='0'?10:parseInt(e.key);

  function harvestCoreEnergy(){if(gameState.coreEnergy<=0){addLog('☀ НЕТ ЭНЕРГИИ!');return;}const c=gameState.coreEnergy;gameState.coreEnergy=0;const b=gameState.modifiers.corePerTurn>2?Math.floor(c*1.5):c;gameState.credits+=b*5;gameState.evolutionPoints+=Math.floor(c/3);addLog(`☀ +${b*5}КР +${Math.floor(c/3)}ЭВО!`);}
  function passiveCoreGeneration(){gameState.coreEnergy=Math.min(gameState.maxCoreEnergy,gameState.coreEnergy+1+gameState.modifiers.corePerTurn);}
  function getGarrisonCount(p){return p.garrison.filter(u=>u.hp>0).length;}

  function drawGalaxy(){
    ctx.clearRect(0,0,W,H);const ox=cam.x*zoom,oy=cam.y*zoom;const ccx=cx-ox,ccy=cy-oy;ctx.imageSmoothingEnabled=false;

    // ===== ОРБИТЫ С ПОДСВЕТКОЙ =====
    planets.forEach(p=>{
      if(p.isCore)return;
      const r=p.dist*zoom;
      ctx.beginPath();ctx.arc(ccx,ccy,r,0,Math.PI*2);
      // Цвет орбиты зависит от типа планеты
      let orbitColor;
      if(p.type==='ally') orbitColor='rgba(0,200,255,0.3)';
      else if(p.type==='enemy') orbitColor='rgba(255,60,60,0.3)';
      else orbitColor='rgba(150,150,150,0.15)';
      ctx.strokeStyle=orbitColor;
      ctx.setLineDash([5,8]);
      ctx.lineWidth=2;
      ctx.stroke();
      ctx.setLineDash([]);

      // Подсветка орбиты выбранной планеты
      if(p.id===gameState.selectedPlanetId){
        ctx.beginPath();ctx.arc(ccx,ccy,r,0,Math.PI*2);
        ctx.strokeStyle='rgba(0,255,255,0.6)';
        ctx.setLineDash([3,5]);
        ctx.lineWidth=3;
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });

    // ===== ПЛАНЕТЫ =====
    planets.forEach(p=>{
      p.ang+=p.speed*0.05;const x=ccx+p.dist*zoom*Math.cos(p.ang),y=ccy+p.dist*zoom*Math.sin(p.ang);p.x=cx+p.dist*Math.cos(p.ang);p.y=cy+p.dist*Math.sin(p.ang);
      if(p.isCore){const r=p.size*zoom;ctx.fillStyle='#ff0';ctx.fillRect(ccx-r/2,ccy-r/2,r,r);ctx.fillStyle='#fff';ctx.fillRect(ccx-r/4,ccy-r/4,r/2,r/2);ctx.fillStyle='#fff';ctx.font=`${Math.max(6,9*zoom)}px 'Press Start 2P'`;ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('СОЛНЦЕ',ccx,ccy-r/2-2);ctx.fillStyle='#0ff';ctx.fillText(`☀${gameState.coreEnergy}/${gameState.maxCoreEnergy}`,ccx,ccy+r/2+6);return;}
      const r=p.size*zoom;
      // Свечение планеты
      ctx.fillStyle='#000';ctx.fillRect(x-r/2-2,y-r/2-2,r+4,r+4);
      ctx.fillStyle=p.color||'#888';ctx.fillRect(x-r/2,y-r/2,r,r);
      // Тень и блик
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(x-r/2,y,r,r/2);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(x-r/2,y-r/2,r/2,r/2);
      // Подсветка выбранной планеты
      if(p.id===gameState.selectedPlanetId){
        ctx.strokeStyle='#0ff';ctx.lineWidth=4;
        ctx.strokeRect(x-r/2-3,y-r/2-3,r+6,r+6);
        // Пульсирующий маркер
        const t=Date.now()/500;
        ctx.fillStyle=`rgba(0,255,255,${0.5+Math.sin(t)*0.3})`;
        ctx.fillRect(x-4,y+r/2+4,8,8);
      }
      // Название и гарнизон
      ctx.fillStyle='#fff';ctx.font=`${Math.max(5,8*zoom)}px 'Press Start 2P'`;ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(p.name,x,y-r/2-4);
      ctx.fillStyle=p.type==='ally'?'#4fc3f7':p.type==='enemy'?'#f55':'#aaa';ctx.textBaseline='top';ctx.fillText(p.type==='neutral'?'○':`x${getGarrisonCount(p)}`,x,y+r/2+4);
    });

    // ===== ЛЕТЯЩИЕ ГРУППЫ =====
    flyingGroups.forEach(g=>{const fx=ccx+(g.x-cx)*zoom,fy=ccy+(g.y-cy)*zoom;ctx.fillStyle=g.owner==='humanity'?'#4af':'#f44';ctx.fillRect(fx-3,fy-3,6,6);ctx.fillStyle='#fff';ctx.font=`${Math.max(5,8*zoom)}px 'Press Start 2P'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(g.units.length,fx,fy-7);});
    updateUIStats();
  }

  function resetState(){gameState.mode='none';gameState.attackSquad=[];gameState.transferSquad=[];document.getElementById('btnAttack').textContent='⚔ АТАКА';document.getElementById('btnTransfer').textContent='📦 ПЕРЕБРОС';}
  function selectPlanet(id){if(battleState||gameState.gameOver)return;gameState.selectedPlanetId=id;resetState();const p=planets.find(pl=>pl.id===id);if(!p)return;document.getElementById('selectedPlanet').textContent=p.name;document.getElementById('selectedOwner').textContent=p.type==='ally'?'АЛЬЯНС':p.type==='enemy'?'ВРАГ':'НЕЙТРАЛ';updateUI();updateRecruitGrid();}

  function executeAttack(tp){if(battleState||gameState.gameOver)return;const sp=planets.find(p=>p.id===gameState.selectedPlanetId);if(!sp||sp.type!=='ally')return;const al=sp.garrison.filter(u=>u.hp>0);const att=[];const ai=[];sp.garrison.forEach((u,i)=>{if(u.hp>0)ai.push(i);});const fr=gameState.attackSquad.map(i=>ai[i]).filter(i=>i!==undefined);const ng=[];sp.garrison.forEach((u,i)=>{if(fr.includes(i))att.push({...u});else if(u.hp>0)ng.push(u);});sp.garrison=ng;if(att.length===0){addLog('НЕТ ЖИВЫХ!');resetState();updateUI();return;}flyingGroups.push({owner:'humanity',targetId:tp.id,units:att,progress:0,x:sp.x,y:sp.y,tx:tp.x,ty:tp.y});addLog(`АТАКА (${att.length}) → ${tp.name}`);resetState();updateUI();selectPlanet(sp.id);}

  document.getElementById('btnNextTurn').addEventListener('click',nextTurn);
  function nextTurn(){if(battleState)return addLog('ИДЁТ БИТВА!');if(gameState.mode!=='none')return addLog('ЗАВЕРШИ ДЕЙСТВИЕ!');if(gameState.gameOver)return;gameState.turn++;gameState.wave++;passiveCoreGeneration();const al=planets.filter(p=>p.type==='ally');gameState.credits+=al.length*10+5;al.forEach(p=>{if(p.special?.bonus==='credits')gameState.credits+=p.special.value;});const ep=planets.find(p=>p.type==='enemy');if(ep){if(gameState.wave%5===0){const ts=['invader','roach','leviathan'];if(gameState.wave>=12)ts.push('leviathan_maw');if(gameState.wave>=20)ts.push('big_leviathan');ep.garrison.push({type:ts[Math.floor(Math.random()*ts.length)],hp:UNIT_TYPES[ts[0]].hp,maxHp:UNIT_TYPES[ts[0]].hp});}if(al.length>0&&ep.garrison.filter(u=>u.hp>0).length>4&&gameState.wave%4===0){let t=al.reduce((a,b)=>getGarrisonCount(a)<getGarrisonCount(b)?a:b);const att=[],rem=[];ep.garrison.forEach(u=>{if(u.hp>0&&att.length<3){att.push({...u});u.hp=0;}else if(u.hp>0)rem.push(u);});ep.garrison=rem;flyingGroups.push({owner:'enemy',targetId:t.id,units:att,progress:0,x:ep.x,y:ep.y,tx:t.x,ty:t.y});addLog(`ВРАГ АТАКУЕТ ${t.name}!`);}}checkGameOver();addLog(`ЦИКЛ ${gameState.turn}`);saveGame();}

  function startBattle(planet,units,owner){

    else{allyUnits=planet.garrison.filter(u=>u.hp>0).map((u,i)=>({...u,id:'a'+i,side:'ally',acted:false,defending:false}));enemyUnits=units.filter(u=>u.hp>0).map((u,i)=>({...u,id:'e'+i,side:'enemy'}));}

  function checkBattleStuck(){if(!battleState)return;if(!battleState.allyUnits.some(u=>u.hp>0)){endBattle(false);return;}if(!battleState.enemyUnits.some(u=>u.hp>0)){endBattle(true);return;}if(battleState.isPlayerTurn&&battleState.allyUnits.every(u=>u.acted||u.hp<=0)){setBattleText('* Все юниты действовали. Ход врага...');battleState.isPlayerTurn=false;renderBattleMenu();setTimeout(executeEnemyTurn,600);}}
  function renderBattleUI(){

  function renderBattleMenu(){
    const menu=document.getElementById('battleMenu');menu.innerHTML='';if(!battleState)return;
    if(!battleState.isPlayerTurn){menu.innerHTML='<div style="grid-column:1/-1;text-align:center;color:#aaa;">ОЖИДАНИЕ...</div>';return;}
    const hasActable=battleState.allyUnits.some(u=>u.hp>0&&!u.acted);const hasEnemies=battleState.enemyUnits.some(u=>u.hp>0);
    if(!hasActable||!hasEnemies){menu.innerHTML='<div style="grid-column:1/-1;text-align:center;color:#aaa;">НЕТ ДОСТУПНЫХ ДЕЙСТВИЙ</div>';return;}
    if(battleState.menuMode==='main'){menu.innerHTML=`<button class="battle-menu-btn" id="btnFight">⚔ АТАКА (${battleState.selectedAllies.length})</button><button class="battle-menu-btn" id="btnDefend">🛡 ЗАЩИТА (${battleState.selectedAllies.length})</button><button class="battle-menu-btn" id="btnRetreat">🏃 БЕЖАТЬ</button><button class="battle-menu-btn" id="btnEndTurn">⏭ КОНЕЦ ХОДА</button>`;document.getElementById('btnFight').addEventListener('click',()=>{if(battleState.selectedAllies.length===0){setBattleText('* Выбери хотя бы одного юнита!');return;}battleState.menuMode='fight';setBattleText('* Выбери врага для атаки.');renderBattleUI();});document.getElementById('btnDefend').addEventListener('click',()=>{if(battleState.selectedAllies.length===0){setBattleText('* Выбери хотя бы одного юнита!');return;}executeDefend();battleState.menuMode='main';battleState.selectedAllies=[];renderBattleUI();renderBattleMenu();checkBattleStuck();});document.getElementById('btnRetreat').addEventListener('click',()=>endBattle(false,true));document.getElementById('btnEndTurn').addEventListener('click',()=>{battleState.isPlayerTurn=false;battleState.allyUnits.forEach(a=>a.defending=false);battleState.selectedAllies=[];setBattleText('* Ход врага...');renderBattleMenu();setTimeout(executeEnemyTurn,600);});}
  }
  function onAllyClick(id){if(!battleState||!battleState.isPlayerTurn)return;const u=battleState.allyUnits.find(a=>a.id===id);if(!u||u.acted||u.hp<=0)return;if(battleState.menuMode==='main'){const idx=battleState.selectedAllies.indexOf(id);if(idx>=0){battleState.selectedAllies.splice(idx,1);}else{battleState.selectedAllies.push(id);}renderBattleUI();renderBattleMenu();}}
  function onEnemyClick(id){if(!battleState||!battleState.isPlayerTurn)return;if(battleState.menuMode==='fight'){battleState.selectedEnemy=id;const df=battleState.enemyUnits.find(e=>e.id===id);if(!df||df.hp<=0)return;battleState.selectedAllies.forEach(aid=>{const at=battleState.allyUnits.find(a=>a.id===aid);if(at&&at.hp>0&&!at.acted){executeBattleAttack(at,df);at.acted=true;}});battleState.selectedAllies=[];battleState.selectedEnemy=null;battleState.menuMode='main';renderBattleUI();renderBattleMenu();checkBattleStuck();}}
  function executeDefend(){battleState.selectedAllies.forEach(aid=>{const u=battleState.allyUnits.find(a=>a.id===aid);if(!u||u.acted||u.hp<=0)return;const roll=rollD20();const total=roll+gameState.modifiers.ac;showD20Popup(roll,roll>=20,roll===1);u.defending=true;u.acted=true;if(roll>=20){u.hp=Math.min(u.maxHp,u.hp+10);setBattleText(`* КРИТ! ${UNIT_TYPES[u.type].name} +10 HP!`);}else if(roll===1){setBattleText(`* ПРОВАЛ! ${UNIT_TYPES[u.type].name} не смог защититься.`);}else if(total>=15){u.hp=Math.min(u.maxHp,u.hp+5);setBattleText(`* ${UNIT_TYPES[u.type].name} +5 HP!`);}else{setBattleText(`* ${UNIT_TYPES[u.type].name} в защите.`);}if(u.type==='engineer'&&total>=15){const al=battleState.allyUnits.filter(a=>a.hp>0&&a.hp<a.maxHp);if(al.length>0){const t=al[Math.floor(Math.random()*al.length)];t.hp=Math.min(t.maxHp,t.hp+5);setBattleText(`* Инженер чинит ${UNIT_TYPES[t.type].name}! +5 HP`);}}});}
  function executeBattleAttack(attacker,defender){const atk=UNIT_TYPES[attacker.type],def=UNIT_TYPES[defender.type];const effAC=Math.max(1,def.ac-Math.floor(gameState.modifiers.enemyDebuff*10));const roll=rollD20();const total=roll+atk.atk+gameState.modifiers.atk;const crit=roll>=20,fail=roll===1;showD20Popup(roll,crit,fail);if(fail){setBattleText('* Промах! Крит-провал...');}else if(crit||total>=effAC){let dmg=parseDamage(atk.dmg);if(crit)dmg*=2;if(atk.special==='камикадзе'){dmg*=2;attacker.hp=0;}if(atk.special==='залп')dmg=Math.floor(dmg*1.3);if(atk.special==='ямато')dmg=Math.floor(dmg*1.5);defender.hp-=dmg;if(defender.hp<=0){defender.hp=0;setBattleText(`* ${def.name} УНИЧТОЖЕН!`);}else{setBattleText(`* ${atk.name} → ${dmg} урона!`);}}else{setBattleText('* Промах!');}if(attacker.hp<=0)setBattleText('* МИНА ВЗОРВАНА!');}
  function executeEnemyTurn(){if(!battleState)return;battleState.enemyUnits.forEach(e=>{if(e.hp<=0)return;const aa=battleState.allyUnits.filter(a=>a.hp>0);if(aa.length===0)return;const t=aa[Math.floor(Math.random()*aa.length)];const ut=UNIT_TYPES[e.type],dt=UNIT_TYPES[t.type];const effAC=dt.ac+gameState.modifiers.ac+(t.defending?4:0);const roll=rollD20();if(roll===1){setBattleText(`* ${ut.name} промахивается!`);}else if(roll>=20||roll+ut.atk>=effAC){let dmg=parseDamage(ut.dmg);if(roll>=20)dmg*=2;if(t.defending)dmg=Math.floor(dmg*0.5);if(ut.special==='камикадзе'){dmg*=2;e.hp=0;}if(ut.special==='крушитель')aa.forEach(a=>{if(a!==t)a.hp-=Math.floor(dmg*0.3);});if(ut.special==='выводок'&&Math.random()<0.2){const ne={id:'e'+battleState.enemyUnits.length,side:'enemy',type:'roach',hp:50,maxHp:50};battleState.enemyUnits.push(ne);setBattleText('* Улей вывел дрона!');}t.hp-=dmg;if(t.hp<=0){t.hp=0;setBattleText(`* ${dt.name} УНИЧТОЖЕН!`);}else{setBattleText(`* ${ut.name} → ${dmg} урона!`);}}else{setBattleText(`* ${ut.name} промахивается!`);}});battleState.round++;battleState.isPlayerTurn=true;battleState.allyUnits.forEach(a=>{a.acted=false;a.defending=false;});battleState.selectedAllies=[];battleState.selectedEnemy=null;battleState.menuMode='main';document.getElementById('battle-title').textContent=`* ПРОТИВНИК: ${battleState.planet.name}`;renderBattleUI();renderBattleMenu();if(!battleState.allyUnits.some(u=>u.hp>0)){endBattle(false);return;}if(!battleState.enemyUnits.some(u=>u.hp>0)){endBattle(true);return;}setBattleText('* Твой ход.');}
  function rollD20(){return Math.floor(Math.random()*20)+1;}
  function showD20Popup(r,crit,fail){const p=document.getElementById('d20Popup');p.style.display='flex';const i=document.getElementById('d20PopupInner');document.getElementById('d20PopupNum').textContent=r;i.className='d20-popup-inner';if(crit)i.classList.add('crit');setTimeout(()=>{p.style.display='none';i.className='d20-popup-inner';},700);}

  function endBattle(isWin,retreat=false){

    let ti,tx;

    else{if(p.type==='ally'){p.garrison=[];p.type='neutral';addLog('ПОТЕРЯНА!');ti='ПОРАЖЕНИЕ';tx=`${p.name} потеряна!`;}else if(p.type==='neutral'){p.garrison=battleState.enemyUnits.filter(u=>u.hp>0).map(u=>({type:u.type,hp:u.hp,maxHp:u.maxHp}));p.type='enemy';addLog('ВРАГ ЗАХВАТИЛ');ti='ПОРАЖЕНИЕ';tx='Враг захватил планету!';}checkGameOver();}

  function capturePlanet(p,s){p.garrison=s;p.type='ally';gameState.evolutionPoints+=1;addLog(`ЗАХВАЧЕНА! +1 ЭВО`);}
  function checkGameOver(){const al=planets.filter(p=>p.type==='ally');const en=planets.find(p=>p.type==='enemy');if(!en||en.type==='ally'){endGame(true);return;}if(al.length===0){endGame(false);return;}}
  function endGame(isWin){gameState.gameOver=true;const al=planets.filter(p=>p.type==='ally').length;const tl=planets.filter(p=>!p.isCore).length;const ti=isWin?'ПОБЕДА!':'ПОРАЖЕНИЕ';const tx=isWin?`Все планеты захвачены! ${al}/${tl}`:`Все планеты потеряны...`;showNotification(ti,tx);}

  function saveGame(){const sd={gameState:{...gameState,attackSquad:[],transferSquad:[],mode:'none'},planetsData:planets.map(p=>({id:p.id,type:p.type,ang:p.ang,garrison:p.garrison.map(u=>({type:u.type,hp:u.hp,maxHp:u.maxHp}))})),flyingGroups:flyingGroups.map(g=>({owner:g.owner,targetId:g.targetId,units:g.units.map(u=>({type:u.type,hp:u.hp,maxHp:u.maxHp})),progress:g.progress,x:g.x,y:g.y,tx:g.tx,ty:g.ty}))};localStorage.setItem('cosmicFrontV30',JSON.stringify(sd));}
  function loadGame(){const d=localStorage.getItem('cosmicFrontV30');if(!d)return addLog('НЕТ СОХРАНЕНИЯ');try{const sd=JSON.parse(d);gameState=sd.gameState;sd.planetsData.forEach(pd=>{const p=planets.find(p=>p.id===pd.id);if(p){p.type=pd.type;p.ang=pd.ang;p.garrison=pd.garrison;}});flyingGroups=sd.flyingGroups;battleState=null;resetState();document.getElementById('battle-overlay').style.display='none';document.getElementById('notificationOverlay').style.display='none';selectPlanet(gameState.selectedPlanetId);renderEvolution();updateRecruitGrid();addLog('ЗАГРУЖЕНО');}catch(e){addLog('ОШИБКА');}}
  document.getElementById('btnSave').addEventListener('click',()=>{saveGame();addLog('СОХРАНЕНО');});
  document.getElementById('btnLoad').addEventListener('click',loadGame);

  function updateGameLoop(){if(gameState.gameOver){drawGalaxy();requestAnimationFrame(updateGameLoop);return;}for(let i=flyingGroups.length-1;i>=0;i--){const g=flyingGroups[i];g.progress+=0.03;if(g.progress>=1){const tP=planets.find(p=>p.id===g.targetId);if(tP)startBattle(tP,g.units,g.owner);flyingGroups.splice(i,1);}else{g.x+=(g.tx-g.x)*0.07;g.y+=(g.ty-g.y)*0.07;}}drawGalaxy();requestAnimationFrame(updateGameLoop);}
  function updateUIStats(){document.getElementById('creditsValue').textContent=gameState.credits;document.getElementById('evoPointsValue').textContent=gameState.evolutionPoints;document.getElementById('coreValue').textContent=`${gameState.coreEnergy}/${gameState.maxCoreEnergy}`;document.getElementById('waveCounter').textContent=gameState.wave;document.getElementById('turnCounter').textContent=gameState.turn;const al=planets.filter(p=>p.type==='ally').length;const tl=planets.filter(p=>!p.isCore).length;document.getElementById('planetCountValue').textContent=`${al}/${tl}`;}
  function addLog(m){const lp=document.getElementById('logPanel');const lines=lp.innerHTML.split('<br>');lines.push(m);if(lines.length>4)lines.shift();lp.innerHTML=lines.join('<br>');lp.scrollTop=lp.scrollHeight;}

  function init(){
    resizeCanvas();createStars();initGarrisons();selectPlanet(3);renderEvolution();updateRecruitGrid();
    addLog(`v30: ОРБИТЫ + СЕНСОР`);
    if(controlMode==='pc')addLog('[A] АТАКА [T] ПЕРЕБРОС');
    addLog('[ПРОБЕЛ] ХОД [1-0] ПЛАНЕТЫ');
    updateGameLoop();
  }
})();
</script>
</body>
</html>
